function TransitModule() {
  const [data, setData] = useState(null);
  const [lastFetch, setLastFetch] = useState(null);
  const [tick, setTick] = useState(0);

  const loadDepartures = async () => {
    try {
      const r = await fetch("/transit/departures");
      if (r.ok) { setData(await r.json()); setLastFetch(new Date()); }
    } catch (e) { console.error("Transit:", e); }
  };

  useEffect(() => {
    loadDepartures();
    const poll = setInterval(loadDepartures, 30000);
    return () => clearInterval(poll);
  }, []);

  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 15000);
    return () => clearInterval(t);
  }, []);

  const fmtTime = (iso) => {
    const mins = Math.round((new Date(iso) - Date.now()) / 60000);
    if (mins <= 0) return { text: "nå", cls: "now" };
    if (mins < 5)  return { text: `${mins} min`, cls: "soon" };
    if (mins < 60) return { text: `${mins} min`, cls: "" };
    return { text: new Date(iso).toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" }), cls: "" };
  };

  return (
    <>
      <div className="module-head">
        <div className="module-title">Avganger</div>
        {lastFetch && <span className="module-sub">{lastFetch.toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" })}</span>}
      </div>
      {!data ? <div className="empty">Laster avganger…</div> : (
        TRANSIT_STOPS.map(({ key, label, dir, mode }) => {
          const calls = (data[key]?.estimatedCalls || []).filter(c =>
            Math.round((new Date(c.expectedDepartureTime) - Date.now()) / 60000) >= 0
          ).slice(0, 2);
          const lineCode = calls[0]?.serviceJourney.line.publicCode || "–";
          return (
            <div key={key} className="transit-row">
              <div className={`transit-line ${mode}`}>
                <span className="transit-mode-icon">{mode === "bus" ? "🚌" : "🚇"}</span>
                {lineCode}
              </div>
              <div className="transit-label">{dir}</div>
              <div className="transit-times">
                {calls.length === 0
                  ? <span className="transit-time" style={{color:"var(--ink-mute)"}}>–</span>
                  : calls.map((c, i) => {
                      const { text, cls } = fmtTime(c.expectedDepartureTime);
                      return (
                        <React.Fragment key={i}>
                          {i > 0 && <span className="transit-sep">·</span>}
                          <span className={`transit-time ${cls}`}>{text}</span>
                        </React.Fragment>
                      );
                    })
                }
              </div>
            </div>
          );
        })
      )}
    </>
  );
}

function fmtCalTime(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleTimeString("no-NO", { hour: "2-digit", minute: "2-digit" });
}
function fmtCalDuration(startTs, endTs) {
  if (!startTs || !endTs) return null;
  const mins = Math.round((endTs - startTs) / 60000);
  if (mins < 60) return `${mins} min`;
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}t ${m}m` : `${h}t`;
}

function CalendarModule({ globalPrefs }) {
  const [events, setEvents] = useState(null);
  const [loadErr, setLoadErr] = useState(null);
  const calUrl = globalPrefs.calendarUrl;

  const load = useCallback(async () => {
    if (!calUrl) return;
    try {
      const r = await fetch(`/calendar/today?url=${encodeURIComponent(calUrl)}`);
      const data = await r.json();
      if (data.error) { setLoadErr(data.error); setEvents(null); }
      else { setEvents(data.events); setLoadErr(null); }
    } catch (e) { setLoadErr(e.message); }
  }, [calUrl]);

  useEffect(() => {
    load();
    const t = setInterval(load, 15 * 60 * 1000);
    return () => clearInterval(t);
  }, [load]);

  const count = events?.length ?? 0;
  return (
    <>
      <div className="module-head">
        <div className="module-title">I dag</div>
        <span className="module-sub">{events ? (count === 0 ? "Fri dag" : `${count} avtal${count === 1 ? "e" : "er"}`) : "Kalender"}</span>
      </div>
      {!calUrl ? (
        <div className="empty">Lim inn iCloud-lenke i innstillingene</div>
      ) : loadErr ? (
        <div className="empty" style={{ color: "var(--red)" }}>{loadErr}</div>
      ) : !events ? (
        <div className="empty">Laster…</div>
      ) : count === 0 ? (
        <div className="empty" style={{ fontStyle: "italic" }}>{globalPrefs.calendarEmptyMessage || "Ingen avtaler i dag ✓"}</div>
      ) : (
        <div className="cal-list">
          {events.map((ev, i) => (
            <div key={i} className="cal-event">
              {ev.allDay
                ? <div className="cal-time allday">Hele dagen</div>
                : <div className="cal-time">{fmtCalTime(ev.startTs)}</div>}
              <div className="cal-body">
                <div className="cal-title">{ev.summary}</div>
                {ev.location && <div className="cal-location">📍 {ev.location}</div>}
                {!ev.allDay && ev.endTs && (
                  <div className="cal-duration">{fmtCalTime(ev.startTs)} – {fmtCalTime(ev.endTs)} · {fmtCalDuration(ev.startTs, ev.endTs)}</div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function ZoneLightControl({ device, onToggle, onSetCapability }) {
  const vals = device.capabilitiesObj || {};
  const [isOn, setIsOn] = useState(!!(vals.onoff?.value));
  const hasDim = (device.capabilities || []).includes("dim");
  const [localDim, setLocalDim] = useState(vals.dim?.value ?? 1);
  const [toggling, setToggling] = useState(false);

  // Sync if parent device data refreshes
  useEffect(() => { setIsOn(!!(device.capabilitiesObj?.onoff?.value)); }, [device.capabilitiesObj?.onoff?.value]);

  const handleToggle = async () => {
    const next = !isOn;
    setIsOn(next);
    setToggling(true);
    await onToggle(device.id, next);
    setToggling(false);
  };

  return (
    <div className="zpop-device">
      <div className="zpop-device-row">
        <div className="zpop-device-name">{device.name}</div>
        <button className={`toggle ${isOn ? "is-on" : ""}`} onClick={handleToggle} disabled={toggling}>
          {toggling ? "…" : isOn ? "På" : "Av"}
        </button>
      </div>
      {hasDim && (
        <div className="control">
          <input type="range" min={0} max={1} step={0.01} value={localDim}
            onChange={e => setLocalDim(parseFloat(e.target.value))}
            onMouseUp={() => onSetCapability(device.id, "dim", localDim)}
            onTouchEnd={() => onSetCapability(device.id, "dim", localDim)}
            className="slider slider-dim" />
          <div className="slider-marks"><span>av</span><span>full</span></div>
        </div>
      )}
    </div>
  );
}

function ZonesModuleSettings({ tree, devicesByZone, globalPrefs, onUpdate }) {
  const [cameras, setCameras] = useState(null);
  useEffect(() => {
    fetch("/camera/ring").then(r => r.ok ? r.json() : null)
      .then(data => setCameras(data || []))
      .catch(() => setCameras([]));
  }, []);

  const flat = [];
  const collect = (zone) => {
    const direct = devicesByZone[zone.id] || [];
    const isContainer = (zone.children || []).length > 0;
    if (direct.length > 0 && !isContainer) flat.push(zone);
    (zone.children || []).forEach(c => collect(c));
  };
  tree.forEach(z => collect(z));

  const map = globalPrefs.zoneCameraMap || {};
  const setCamera = (zoneId, cameraId) => {
    const next = { ...map };
    if (cameraId) next[zoneId] = cameraId;
    else delete next[zoneId];
    onUpdate({ ...globalPrefs, zoneCameraMap: next });
  };

  if (!cameras) return <div className="settings-hint">Henter kameraer…</div>;

  return (
    <div className="module-settings-drawer">
      <div className="settings-title">Kamera per rom</div>
      {cameras.length === 0 && <div className="settings-hint">Ingen Ring-kameraer konfigurert.</div>}
      {cameras.length > 0 && flat.map(zone => (
        <div key={zone.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 0", gap: 8 }}>
          <span style={{ fontSize: 13, flex: 1 }}>{zone.name}</span>
          <select className="settings-select" style={{ width: "auto", minWidth: 100 }}
            value={map[zone.id] || ""}
            onChange={e => setCamera(zone.id, e.target.value)}>
            <option value="">—</option>
            {cameras.map(c => <option key={c.id} value={String(c.id)}>{c.name}</option>)}
          </select>
        </div>
      ))}
    </div>
  );
}

function ZonesOverviewModule({ tree, devicesByZone, onToggle, onSetCapability, globalPrefs }) {
  const [selected, setSelected] = useState(null);
  const flat = [];
  const collect = (zone) => {
    const direct = devicesByZone[zone.id] || [];
    const isContainer = (zone.children || []).length > 0;
    if (direct.length > 0 && !isContainer) flat.push({ zone, devices: direct });
    (zone.children || []).forEach(c => collect(c));
  };
  tree.forEach(z => collect(z));

  return (
    <>
      {selected && (
        <ZonePopup
          zone={selected}
          devices={devicesByZone[selected.id] || []}
          onClose={() => setSelected(null)}
          onToggle={onToggle}
          onSetCapability={onSetCapability}
          globalPrefs={globalPrefs}
        />
      )}
      {flat.length === 0 ? (
        <div className="empty">Ingen rom</div>
      ) : (
        <div className="zones-overview">
          {flat.map(({ zone, devices }, i) => {
            const lights = devices.filter(d => (d.capabilities || []).includes("onoff") && (d.class === "light" || (d.capabilities || []).includes("dim")));
            const lightsOn = lights.filter(d => d.capabilitiesObj?.onoff?.value).length;
            const temps = devices.filter(d => d.capabilitiesObj?.measure_temperature?.value != null);
            const avgTemp = temps.length ? (temps.reduce((s, d) => s + Number(d.capabilitiesObj.measure_temperature.value), 0) / temps.length).toFixed(1) : null;

            return (
              <React.Fragment key={zone.id}>
                <div className="zone-tile" onClick={() => setSelected(zone)}>
                  <div className="zone-tile-name">{zone.name}</div>
                  <div className="zone-tile-stats">
                    {lights.length > 0 && (
                      <div className="zone-tile-stat">
                        <div className="zone-tile-val">{lightsOn}<em>/{lights.length}</em></div>
                      </div>
                    )}
                    {avgTemp && (
                      <div className="zone-tile-stat">
                        <div className="zone-tile-val">{avgTemp}<span className="zone-tile-lbl">°</span></div>
                      </div>
                    )}
                  </div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      )}
    </>
  );
}

// ==================== SONOS ====================
const RADIO_STATIONS = [
  { name: "NRK P1", stream: "https://cdn0-47115-liveicecast0.dna.contentdelivery.net/p1_mp3_h", logo: "/public/nrk-p1.svg?v=2" },
  { name: "NRK P2", stream: "https://cdn0-47115-liveicecast0.dna.contentdelivery.net/p2_aac_h", logo: "/public/nrk-p2.svg?v=2" },
  { name: "NRK P3", stream: "https://cdn0-47115-liveicecast0.dna.contentdelivery.net/p3_mp3_h", logo: "/public/nrk-p3.svg?v=2" },
];

function SonosModule() {
  const [speakers, setSpeakers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedIps, setSelectedIps] = useState(new Set());
  const [playingStation, setPlayingStation] = useState(null);
  const [busy, setBusy] = useState(false);
  const [spotifyOpen, setSpotifyOpen] = useState(false);
  const [spotifyTrack, setSpotifyTrack] = useState(null);
  const [spotifyImage, setSpotifyImage] = useState(null);

  useEffect(() => {
    fetch("/spotify/player").then(r => r.ok ? r.json() : null).then(player => {
      if (player?.item) {
        setSpotifyTrack(player.item.name + (player.item.artists?.[0] ? " · " + player.item.artists[0].name : ""));
        setSpotifyImage(player.item.album?.images?.[1]?.url || player.item.album?.images?.[0]?.url || null);
      }
    }).catch(() => {});
  }, []);

  const load = useCallback(async () => {
    try {
      const data = await fetch("/sonos/devices").then(r => r.json());
      setSpeakers(data);
    } catch {}
    setLoading(false);
  }, []);

  useEffect(() => { load(); const t = setInterval(load, 10000); return () => clearInterval(t); }, [load]);

  useEffect(() => {
    if (!spotifyTrack && !spotifyImage) return;
    if (speakers.length === 0) return;
    const anyPlaying = speakers.some(s => s.state === "playing");
    if (!anyPlaying) { setSpotifyTrack(null); setSpotifyImage(null); }
  }, [speakers]);

  const toggleSpeaker = (ip) => {
    setSelectedIps(prev => {
      const next = new Set(prev);
      if (next.has(ip)) {
        next.delete(ip);
        const spk = speakers.find(s => s.ip === ip);
        if (spk?.state === "playing") {
          control(ip, "pause");
          setPlayingStation(null);
          setSpotifyTrack(null);
          setSpotifyImage(null);
        }
      } else {
        next.add(ip);
      }
      return next;
    });
  };

  const playRadio = async (station) => {
    setSpotifyTrack(null);
    setSpotifyImage(null);
    setBusy(true);
    setPlayingStation(station.name);
    const targets = selectedIps.size > 0 ? [...selectedIps] : speakers.map(s => s.ip);
    await Promise.all(targets.map(ip =>
      fetch("/sonos/radio", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ip, streamUrl: station.stream, stationName: station.name }) })
    ));
    setBusy(false);
    setTimeout(load, 1500);
  };

  const control = async (ip, action, volume) => {
    await fetch("/sonos/control", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ip, action, volume }) });
    setTimeout(load, 600);
  };

  if (loading) return <div className="empty">Søker etter høyttalere…</div>;
  if (!speakers.length) return <div className="empty">Ingen Sonos-høyttalere funnet</div>;

  const selectedSpeakers = speakers.filter(s => selectedIps.has(s.ip));
  const displayVolume = selectedSpeakers.length > 0
    ? Math.round(selectedSpeakers.reduce((sum, s) => sum + s.volume, 0) / selectedSpeakers.length)
    : 50;

  return (
    <div>
      <div className="sonos-stations" style={{ gridTemplateColumns: "repeat(4, 1fr)" }}>
        {RADIO_STATIONS.map(st => (
          <button key={st.name} className={`sonos-station-btn ${playingStation === st.name ? "active" : ""}`}
            onClick={() => playRadio(st)} disabled={busy || selectedIps.size === 0}>
            <img src={st.logo} alt={st.name} />
          </button>
        ))}
        <button className={`sonos-station-btn sonos-station-spotify${spotifyImage ? " sonos-station-spotify-playing" : ""}`}
          onClick={() => setSpotifyOpen(true)} disabled={selectedIps.size === 0}>
          {spotifyImage
            ? <img src={spotifyImage} alt="Album cover" style={{ borderRadius: 4, display: "block", width: "100%", height: "auto" }} />
            : SPOTIFY_LOGO}
          {spotifyTrack && <div className="sonos-spotify-track"><span>{spotifyTrack}</span></div>}
        </button>

      </div>

      <div className="sonos-stations" style={{ marginTop: 8, marginBottom: 0 }}>
        {speakers.map(spk => (
          <button key={spk.ip}
            className={`sonos-station-btn sonos-speaker-btn ${selectedIps.has(spk.ip) ? "selected" : ""}`}
            onClick={() => toggleSpeaker(spk.ip)}>
            {spk.name}{spk.state === "playing" ? " ▶" : ""}
          </button>
        ))}
      </div>

      <div className="sonos-controls">
        <div className="sonos-vol-wrap">
          <input type="range" min={0} max={100} step={1}
            value={displayVolume}
            className="slider"
            onChange={e => setSpeakers(prev => prev.map(s => selectedIps.has(s.ip) ? { ...s, volume: +e.target.value } : s))}
            onMouseUp={e => [...selectedIps].forEach(ip => control(ip, "volume", +e.target.value))}
            onTouchEnd={e => [...selectedIps].forEach(ip => control(ip, "volume", +e.target.value))} />
        </div>
        <span style={{ fontSize: 10, color: "var(--ink-mute)", flexShrink: 0 }}>{displayVolume}</span>
      </div>

      {spotifyOpen && <SpotifyOverlay onClose={() => setSpotifyOpen(false)} sonosIps={[...selectedIps]}
        onNowPlaying={(track, image) => { setSpotifyTrack(track); setSpotifyImage(image); }} />}
    </div>
  );
}

// ==================== AUDI MODULE ====================
function AudiModule() {
  const [data, setData]   = useState(null);
  const [error, setError] = useState(null);
  const [busy, setBusy]   = useState(false);
  const [temp, setTemp]   = useState(21);

  const load = useCallback(async () => {
    try {
      const r = await fetch("/audi/status");
      if (!r.ok) { setError((await r.json()).error || `Feil ${r.status}`); return; }
      setData(await r.json());
      setError(null);
    } catch (e) { setError(e.message); }
  }, []);

  useEffect(() => {
    load();
    const t = setInterval(load, data?.climateOn ? 30000 : 60000);
    return () => clearInterval(t);
  }, [load, data?.climateOn]);

  useEffect(() => {
    if (data?.climateTemp != null) setTemp(data.climateTemp);
  }, [data?.climateTemp]);

  const climateStart = async () => {
    setBusy(true);
    try {
      await fetch("/audi/climate/start", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ temperature: temp }) });
      setTimeout(load, 4000);
    } catch {}
    setBusy(false);
  };

  const climateStop = async () => {
    setBusy(true);
    try {
      await fetch("/audi/climate/stop", { method: "POST" });
      setTimeout(load, 4000);
    } catch {}
    setBusy(false);
  };

  if (error) return <div className="empty" style={{ color: "var(--red)", fontSize: 11 }}>{error}</div>;
  if (!data)  return <div className="empty">Henter bildata…</div>;

  const pct      = data.batteryPct ?? 0;
  const barColor = pct > 20 ? "var(--moss)" : "var(--red)";
  const chargingLabel = data.chargingState === "charging"
    ? `Lader ${data.chargeKw != null ? data.chargeKw.toFixed(1) + " kW" : ""}`.trim()
    : data.chargingState === "readyForCharging" ? "Klar for lading"
    : data.chargingState === "conserving" ? "Vedlikeholder"
    : null;

  return (
    <div>
      <div className="audi-battery-row">
        <div className="audi-pct"><em>{pct}</em>%</div>
        <div className="audi-meta">
          {data.rangeKm != null && <span className="audi-range">{Math.round(data.rangeKm)} km rekkevidde</span>}
          {chargingLabel && <span className="audi-charging">⚡ {chargingLabel}</span>}
          {!data.plugConnected && <span className="audi-plug">Ikke tilkoblet</span>}
          {data.plugConnected && !chargingLabel && <span className="audi-plug">Tilkoblet</span>}
        </div>
      </div>
      <div className="audi-bar-wrap">
        <div className="audi-bar" style={{ width: `${pct}%`, background: barColor }} />
      </div>

      <hr className="audi-divider" />

      <div className="audi-climate-row">
        <div>
          <div className="audi-climate-label">Klimaanlegg</div>
          {data.climateOn && (
            <div className="audi-climate-state">
              ● Aktiv{data.climateState === "ventilation" ? " (ventilasjon)" : ""}
              {data.climateMinutes > 0 && ` — ${data.climateMinutes} min igjen`}
            </div>
          )}
        </div>
        {data.climateTemp != null && <span style={{ fontSize: 12, color: "var(--ink-mute)" }}>{data.climateTemp}°C</span>}
      </div>
      <div className="audi-temp-row">
        <input className="audi-temp-input" type="number" min={16} max={29} value={temp}
          onChange={e => setTemp(+e.target.value)} />
        <button className="audi-temp-btn start" onClick={climateStart} disabled={busy || (data.climateOn && temp === data.climateTemp)}>
          {data.climateOn && temp !== data.climateTemp ? "Oppdater" : "Start klima"}
        </button>
        {data.climateOn && (
          <button className="audi-temp-btn stop" onClick={climateStop} disabled={busy}>
            Stopp
          </button>
        )}
      </div>
    </div>
  );
}

function SpotifyOverlay({ onClose, sonosIps, onNowPlaying }) {
  const { authed, playlists, devices, deviceId, setDeviceId, nowPlaying, isPlaying, activeUri, busy, play, togglePause, reload, playError } = useSpotify();

  const playOnSonos = async (item) => {
    if (!sonosIps?.length) return play(item);
    await Promise.all(sonosIps.map(ip =>
      fetch("/sonos/spotify", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ip, uri: item.uri, name: item.name }) })
    ));
    const track = item.name + (item.artists?.[0] ? " · " + item.artists[0].name : "");
    const image = item._image || item.images?.[0]?.url || null;
    onNowPlaying?.(track, image);
  };

  const [results, setResults] = useState(null);

  useEffect(() => {

      const d = await fetch(`/spotify/search?q=${encodeURIComponent(query)}`).then(r => r.json()).catch(() => null);
      if (!d) return;
      const tracks = (d.tracks?.items || []).map(t => ({ ...t, _image: t.album?.images?.[0]?.url }));
      const albums = (d.albums?.items || []);
      setResults([...tracks, ...albums].filter(Boolean));
    }, 380);
    return () => clearTimeout(t);
  }, [query, authed]);

  const items = results !== null ? results : [];
  const sectionLabel = results !== null ? `Søkeresultater (${results.length})` : null;

  return (
    <div className="spotify-backdrop" onClick={onClose}>
      <div className="spotify-panel" onClick={e => e.stopPropagation()}>
        <div className="spotify-head">
          <div className="spotify-title">{SPOTIFY_LOGO}Spotify</div>
          <button className="config-close" onClick={onClose}>Lukk</button>

        <div className="spotify-body">

            <div className="spotify-connect-screen">

              <p style={{ fontSize: 11, color: "var(--ink-mute)" }}>Krever SPOTIFY_CLIENT_ID og SPOTIFY_CLIENT_SECRET i .env</p>
            </div>
          )}

          {authed === true && (
            <>
              <input className="spotify-search" type="text" placeholder="🔍  Søk etter låt eller album…"

                <div className="spotify-now">

                  <span className="spotify-now-text">{nowPlaying}</span>
                  <button className="spotify-pause-btn" onClick={togglePause} disabled={busy}>{isPlaying ? "⏸" : "▶"}</button>
                </div>
              )}

              {sectionLabel && <div className="spotify-section">{sectionLabel}</div>}
              <div className="spotify-list">
                {items.map(item => item && (
                  <button key={item.id} className={`spotify-item ${activeUri === item.uri ? "active" : ""}`}
                    onClick={() => playOnSonos(item)} disabled={busy}>
                    {(item._image || item.images?.[0]?.url)
                      ? <img className="spotify-item-img" src={item._image || item.images[0].url} alt="" />
                      : <div className="spotify-item-placeholder">🎵</div>}
                    <div className="spotify-item-info">
                      <div className="spotify-item-name">{item.name}</div>
                      <div className="spotify-item-meta">{item.type === "track" ? `${item.artists?.[0]?.name || ""} · ${item.album?.name || ""}` : item.type === "album" ? `Album · ${item.artists?.[0]?.name || ""}` : `Spilleliste · ${item.tracks?.total || "?"} låter`}</div>
                    </div>
                    <span className="spotify-item-play">{activeUri === item.uri ? "♪" : "▶"}</span>
                  </button>
                ))}
                {items.length === 0 && results !== null && <div className="empty">Ingen treff</div>}
              </div>

              {playError && (
                <div className="empty" style={{ color: "var(--red)", fontSize: 11 }}>{playError}</div>

                <div className="spotify-device-bar">

function useSpotify() {
  const [authed, setAuthed] = useState(null);
  const [playlists, setPlaylists] = useState([]);
  const [devices, setDevices] = useState([]);
  const [deviceId, setDeviceId] = useState("");
  const [nowPlaying, setNowPlaying] = useState(null);
  const [nowPlayingImage, setNowPlayingImage] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [activeUri, setActiveUri] = useState(null);
  const [busy, setBusy] = useState(false);
  const [playError, setPlayError] = useState(null);

  const reload = useCallback(async () => {
    const status = await fetch("/spotify/auth/status").then(r => r.json()).catch(() => ({ authenticated: false }));
    setAuthed(status.authenticated);
    if (!status.authenticated) return;
    const [pl, devs, player] = await Promise.all([
      fetch("/spotify/me/playlists").then(r => r.json()).catch(() => null),
      fetch("/spotify/devices").then(r => r.json()).catch(() => null),
      fetch("/spotify/player").then(r => r.ok ? r.json() : null).catch(() => null),
    ]);
    setPlaylists(pl?.items || []);
    setDevices(devs?.devices || []);
    if (player?.device?.id) setDeviceId(id => id || player.device.id);
    if (player?.item) {
      setNowPlaying(player.item.name + (player.item.artists?.[0] ? " · " + player.item.artists[0].name : ""));
      setNowPlayingImage(player.item.album?.images?.[1]?.url || player.item.album?.images?.[0]?.url || null);
      setActiveUri(player?.context?.uri || null);
    }
    setIsPlaying(player?.is_playing ?? false);
  }, []);

  useEffect(() => { reload(); }, [reload]);

  const play = async (item) => {
    setBusy(true);
    setPlayError(null);
    try {
      const isTrack = item.type === "track";
      const r = await fetch("/spotify/play", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          ...(isTrack ? { uris: [item.uri] } : { context_uri: item.uri }),
          device_id: deviceId || undefined,
        }) });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        setPlayError(err.error || "Klarte ikke starte avspilling");
      } else {
        setActiveUri(item.uri);
        setNowPlaying(item.name + (item.artists?.[0] ? " · " + item.artists[0].name : ""));
        setNowPlayingImage(item._image || item.album?.images?.[0]?.url || null);
        setIsPlaying(true);
      }
    } catch (e) { setPlayError(e.message); }
    setBusy(false);
  };

  const togglePause = async () => {
    setBusy(true);
    try {
      await fetch("/spotify/pause", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ device_id: deviceId || undefined, resume: !isPlaying }) });
      setIsPlaying(p => !p);
    } catch (e) { console.error(e); }
    setBusy(false);
  };

  return { authed, playlists, devices, deviceId, setDeviceId, nowPlaying, nowPlayingImage, isPlaying, activeUri, busy, play, togglePause, reload, playError };
}

function SpotifyModule() {

  const [query, setQuery] = useState("");
  const [results, setResults] = useState(null);

  useEffect(() => {
    if (!authed || !query.trim()) { setResults(null); return; }
    const t = setTimeout(async () => {
      const d = await fetch(`/spotify/search?q=${encodeURIComponent(query)}`).then(r => r.json()).catch(() => null);
      if (!d) return;
      const tracks2 = (d.tracks?.items || []).map(t => ({ ...t, _image: t.album?.images?.[0]?.url }));
      setResults([...tracks2, ...(d.albums?.items || [])].filter(Boolean));
    }, 380);
    return () => clearTimeout(t);
  }, [query, authed]);

  const items = results !== null ? results : playlists;

  return (
    <>
      <div className="module-head">
        <div className="module-title" style={{ display: "flex", alignItems: "center", gap: 6 }}>{SPOTIFY_LOGO}Spotify</div>
        {nowPlaying && <span className="module-sub" style={{ color: "#1DB954" }}>▶</span>}
      </div>

      {authed === null && <div className="empty">Laster…</div>}

          <a href="/spotify/auth/login" className="spotify-connect-btn" style={{ fontSize: 12, padding: "8px 16px" }}>Koble til Spotify</a>
        </div>
      )}

      {authed === true && (
        <>
          {nowPlaying && (
            <div className="spotify-now">
              <div className="spotify-now-dot" />
              <span className="spotify-now-text">{nowPlaying}</span>
            </div>
          )}

          <input className="spotify-search" type="text" placeholder="🔍  Søk…"
            value={query} onChange={e => setQuery(e.target.value)} />

          <div className="spotify-section">{results !== null ? `Søkeresultater (${results.length})` : "Mine spillelister"}</div>
          <div className="spotify-list" style={{ flex: 1, overflowY: "auto", minHeight: 0 }}>
            {items.map(item => item && (
              <button key={item.id} className={`spotify-item ${activeUri === item.uri ? "active" : ""}`}
                onClick={() => play(item)} disabled={busy}>

                  ? <img className="spotify-item-img" src={item.images[0].url} alt="" />
                  : <div className="spotify-item-placeholder">🎵</div>}
                <div className="spotify-item-info">
                  <div className="spotify-item-name">{item.name}</div>
                  <div className="spotify-item-meta">{item.type === "album" ? `Album · ${item.artists?.[0]?.name || ""}` : `Spilleliste · ${item.tracks?.total || "?"} låter`}</div>
                </div>
                <span className="spotify-item-play">{activeUri === item.uri ? "♪" : "▶"}</span>
              </button>
            ))}
            {items.length === 0 && results !== null && <div className="empty">Ingen treff</div>}
          </div>

          {playError && (
            <div className="empty" style={{ color: "var(--red)", fontSize: 11 }}>{playError}</div>
          )}

          <div className="spotify-device-bar">
            <span className="spotify-device-lbl">Enhet</span>
            {devices.length > 0
              ? <select className="spotify-device-select" value={deviceId} onChange={e => setDeviceId(e.target.value)}>
                  <option value="">— Aktiv enhet —</option>
                  {devices.map(d => <option key={d.id} value={d.id}>{d.name}{d.is_active ? " ✓" : ""}</option>)}
                </select>
              : <span style={{ flex: 1, fontSize: 11, color: "var(--ink-mute)" }}>Åpne Spotify på en enhet først</span>
            }
            <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 13, color: "var(--ink-mute)", padding: "2px 4px" }} onClick={reload} title="Oppdater enheter">↻</button>
          </div>
        </>
      )}
    </>
  );
}

function SceneButton({ flow, onRun }) {
  const [running, setRunning] = useState(false);
  const [ran, setRan] = useState(false);
  const [failed, setFailed] = useState(false);
  const handle = async (e) => {
    e.stopPropagation();
    if (running) return;
    setRunning(true);
    setFailed(false);
    try {
      await onRun(flow.id);
      setRan(true);
      setTimeout(() => setRan(false), 1800);
    } catch (err) {
      console.error("Flow trigger feil:", err);
      setFailed(true);
      setTimeout(() => setFailed(false), 2500);
    } finally {
      setRunning(false);
    }
  };
  return (
    <button className={`scene-btn ${ran ? "ran" : ""} ${failed ? "failed" : ""}`} onClick={handle} disabled={running || flow.enabled === false}>
      <span className="scene-name">{flow.name}</span>
      <span className="scene-arrow">{running ? "…" : ran ? "✓" : failed ? "✗" : flow.enabled === false ? "—" : "→"}</span>
    </button>
  );
}

// ==================== MODULE FRAME (drag/drop wrapper) ====================
function ModuleFrame({ module, idx, isEdit, onMove, onSetCol, onRemove, onToggleSettings, settingsOpen, onDragStart, onDragOver, onDrop, isDragging, isDropTarget, style, children }) {
  const span = module.span || MODULE_TYPES[module.type]?.defaultSpan || 1;
  return (
    <div
      className={`module span-${span} ${isDragging ? "dragging" : ""} ${isDropTarget ? "drop-target" : ""} ${settingsOpen ? "settings-open" : ""}`}
      style={style}
      draggable={isEdit}
      onDragStart={(e) => onDragStart(e, idx)}
      onDragOver={(e) => onDragOver(e, idx)}
      onDragLeave={(e) => e.currentTarget.classList.remove("drop-target")}
      onDrop={(e) => onDrop(e, idx)}
    >
      {isEdit && (
        <div className="module-edit-controls">
          <button className="edit-btn" onClick={() => onSetCol(idx, -1)} title="Flytt kolonne venstre">←</button>
          <button className="edit-btn" onClick={() => onMove(idx, -1)} title="Flytt opp">↑</button>
          <button className="edit-btn" onClick={() => onMove(idx, +1)} title="Flytt ned">↓</button>
          <button className="edit-btn" onClick={() => onSetCol(idx, +1)} title="Flytt kolonne høyre">→</button>
          <button className="edit-btn" onClick={() => onToggleSettings(idx)} title="Innstillinger">⚙</button>
          <button className="edit-btn danger" onClick={() => onRemove(idx)} title="Fjern">×</button>
        </div>
      )}
      {children}
    </div>
  );
}

// ==================== MASONRY GRID ====================
function MasonryGrid({ modules, renderContent }) {
  const segments = useMemo(() => {
    const segs = [];
    let buffer = [];
    const flush = () => { if (buffer.length) { segs.push({ type: 'row', mods: [...buffer] }); buffer = []; } };
    for (const mod of modules) {
      const span = mod.span || MODULE_TYPES[mod.type]?.defaultSpan || 1;
      if (span === 1) buffer.push(mod);
      else { flush(); segs.push({ type: 'wide', mod }); }
    }
    flush();
    return segs;
  }, [modules]);

  return (
    <div className="home-masonry">
      {segments.length === 0 && <div className="empty">Ingen moduler. Trykk Rediger og legg til noen.</div>}
      {segments.map((seg, si) => {
        if (seg.type === 'wide') {
          return <div key={seg.mod.id} className="module">{renderContent(seg.mod)}</div>;
        }
        const cols = [[], [], []];
        seg.mods.forEach((m, i) => cols[m.col ?? i % 3].push(m));
        return (
          <div key={`row-${si}`} className="home-masonry-row">
            {cols.filter(c => c.length > 0).map((colMods, ci) => (
              <div key={ci} className="home-masonry-col">
                {colMods.map(mod => <div key={mod.id} className="module">{renderContent(mod)}</div>)}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ==================== HOME VIEW ====================
function HomeView({ devices, flows, zones, tree, devicesByZone, prefs, globalPrefs, onUpdateGlobalPrefs, onSetCapability, onToggle, onUpdatePrefs, onRunFlow, isEdit, profileName = 'default' }) {
  const [pickerOpen, setPickerOpen] = useState(false);
  const [settingsForIdx, setSettingsForIdx] = useState(null);

  useEffect(() => {
    if (!isEdit) { setSettingsForIdx(null); setPickerOpen(false); }
  }, [isEdit]);
  const [draggingIdx, setDraggingIdx] = useState(null);
  const [dropTargetIdx, setDropTargetIdx] = useState(null);

  const isDefaultProfile = profileName === 'default';

  const DEFAULT_MODULES = [
    { id: "m1", type: "hanweather" },
    { id: "m3", type: "transit" },
    { id: "m4", type: "flows" },
    { id: "m5", type: "favorites" },
    { id: "m6", type: "zones" },
  ];

  const modules = isDefaultProfile
    ? (globalPrefs.dashboardModules || DEFAULT_MODULES)
    : (globalPrefs.profiles?.[profileName]?.modules || globalPrefs.dashboardModules || DEFAULT_MODULES);

  const updateModules = (newMods) => {
    if (isDefaultProfile) {
      onUpdateGlobalPrefs({ ...globalPrefs, dashboardModules: newMods });
    } else {
      const profiles = { ...(globalPrefs.profiles || {}) };
      profiles[profileName] = { ...profiles[profileName], modules: newMods };
      onUpdateGlobalPrefs({ ...globalPrefs, profiles });
    }
  };

  const handleMove = (idx, dir) => {
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= modules.length) return;
    const next = [...modules];
    [next[idx], next[newIdx]] = [next[newIdx], next[idx]];
    updateModules(next);
  };

  const handleSetCol = (idx, dir) => {
    const mod = modules[idx];
    const current = mod.col ?? idx % 3;
    const next = [...modules];
    next[idx] = { ...mod, col: (current + dir + 3) % 3 };
    updateModules(next);
  };

  const handleRemove = (idx) => {
    if (!confirm(`Fjerne "${MODULE_TYPES[modules[idx].type]?.title}"?`)) return;
    updateModules(modules.filter((_, i) => i !== idx));
  };

  const handleAdd = (type) => {
    const newMod = { id: "m" + Date.now(), type };
    updateModules([...modules, newMod]);
    setPickerOpen(false);
  };

  const handleToggleSettings = (idx) => {
    setSettingsForIdx(settingsForIdx === idx ? null : idx);
  };

  const handleDragStart = (e, idx) => {
    if (!isEdit) return;
    setDraggingIdx(idx);
    e.dataTransfer.effectAllowed = "move";
  };
  const handleDragOver = (e, idx) => {
    if (!isEdit || draggingIdx === null) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setDropTargetIdx(idx);
  };
  const handleDrop = (e, dropIdx) => {
    if (!isEdit || draggingIdx === null || draggingIdx === dropIdx) {
      setDraggingIdx(null);
      setDropTargetIdx(null);
      return;
    }
    e.preventDefault();
    const next = [...modules];
    const [moved] = next.splice(draggingIdx, 1);
    next.splice(dropIdx, 0, moved);
    updateModules(next);
    setDraggingIdx(null);
    setDropTargetIdx(null);
  };

  const renderModuleContent = (mod) => {
    switch (mod.type) {
      case "hanweather": return <HanWeatherModule devices={devices} zones={zones} globalPrefs={globalPrefs} />;
      case "camera": return <CameraModule globalPrefs={globalPrefs} />;
      case "calendar": return <CalendarModule globalPrefs={globalPrefs} />;
      case "han": return <HanModule devices={devices} prefs={prefs} globalPrefs={globalPrefs} />;
      case "weather": return <WeatherModule devices={devices} zones={zones} globalPrefs={globalPrefs} />;
      case "transit": return <TransitModule />;
      case "flows": return <FlowsModule flows={flows} globalPrefs={globalPrefs} onRunFlow={onRunFlow} />;
      case "favorites": return <FavoritesModule devices={devices} globalPrefs={globalPrefs} onToggle={onToggle} onSetCapability={onSetCapability} prefs={prefs} onUpdatePrefs={onUpdatePrefs} />;
      case "zones": return <ZonesOverviewModule tree={tree} devicesByZone={devicesByZone} onToggle={onToggle} onSetCapability={onSetCapability} globalPrefs={globalPrefs} />;
      case "zonesimple": return <ZonesSimpleModule tree={tree} devicesByZone={devicesByZone} onToggle={onToggle} onSetCapability={onSetCapability} globalPrefs={globalPrefs} />;
      case "sonos": return <SonosModule />;
      case "roborock": return <RoboRockModule devices={devices} flows={flows} globalPrefs={globalPrefs} onSetCapability={onSetCapability} onRunFlow={onRunFlow} />;
      case "spotify": return <SpotifyModule />;
      case "zaptec": return <ZaptecModule />;
      case "audi": return <AudiModule />;
      default: return <div className="empty">Ukjent modul</div>;
    }
  };

  const renderModuleSettings = (mod) => {
    switch (mod.type) {
      case "hanweather": return <HanWeatherModuleSettings devices={devices} zones={zones} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "camera": return <CameraModuleSettings globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "calendar": return <CalendarModuleSettings globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "han": return <HanModuleSettings devices={devices} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "weather": return <WeatherModuleSettings devices={devices} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "flows": return <FlowsModuleSettings flows={flows} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "favorites": return <FavoritesModuleSettings devices={devices} zones={zones} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "zones":
      case "zonesimple": return <ZonesModuleSettings tree={tree} devicesByZone={devicesByZone} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      case "roborock": return <RoboRockModuleSettings devices={devices} flows={flows} globalPrefs={globalPrefs} onUpdate={onUpdateGlobalPrefs} />;
      default: return null;
    }
  };

  const usedTypes = new Set(modules.map(m => m.type));
  const availableTypes = Object.keys(MODULE_TYPES).filter(t => !usedTypes.has(t));

  return (
    <>
      {isEdit && availableTypes.length > 0 && (
        <div style={{ display: "flex", justifyContent: "flex-end", paddingBottom: 10, flexShrink: 0 }}>
          <button className="pill-btn terracotta" onClick={() => setPickerOpen(true)}>+ Legg til</button>
        </div>
      )}

      {isEdit ? (
        <div className="home-grid edit-mode">
          {modules.length === 0 && (
            <div className="empty" style={{ gridColumn: "1/-1" }}>Ingen moduler. Trykk Rediger og legg til noen.</div>
          )}
          {modules.map((mod, idx) => {
            const span = mod.span || MODULE_TYPES[mod.type]?.defaultSpan || 1;
            const editStyle = span === 1 ? { gridColumn: (mod.col ?? idx % 3) + 1 } : undefined;
            return (
              <ModuleFrame
                key={mod.id} module={mod} idx={idx}
                isEdit={true}
                onMove={handleMove}
                onSetCol={handleSetCol}
                onRemove={handleRemove}
                onToggleSettings={handleToggleSettings}
                settingsOpen={settingsForIdx === idx}
                onDragStart={handleDragStart}
                onDragOver={handleDragOver}
                onDrop={handleDrop}
                isDragging={draggingIdx === idx}
                isDropTarget={dropTargetIdx === idx && draggingIdx !== idx}
                style={editStyle}
              >
                {renderModuleContent(mod)}
              </ModuleFrame>
            );
          })}
        </div>
      ) : (
        <MasonryGrid modules={modules} renderContent={renderModuleContent} />
      )}

      {settingsForIdx !== null && modules[settingsForIdx] && (
        <div className="config-overlay" onClick={() => setSettingsForIdx(null)}>
          <div className="config-panel" onClick={e => e.stopPropagation()}>
            <div className="config-head">
              <div className="config-title"><em>{MODULE_TYPES[modules[settingsForIdx].type]?.title}</em> innstillinger</div>
              <button className="config-close" onClick={() => setSettingsForIdx(null)}>Lukk</button>
            </div>
            <div className="config-body">
              {renderModuleSettings(modules[settingsForIdx])}
            </div>
          </div>
        </div>
      )}

      {pickerOpen && (
        <div className="picker-backdrop" onClick={() => setPickerOpen(false)}>
          <div className="picker" onClick={(e) => e.stopPropagation()}>
            <div className="picker-title">Legg til modul</div>
            <div className="picker-sub">Velg fra biblioteket</div>
            <div className="picker-list">
              {availableTypes.map(type => (
                <button key={type} className="picker-item" onClick={() => handleAdd(type)}>
                  <div>
                    <div className="picker-item-name">{MODULE_TYPES[type].title}</div>
                    <div className="picker-item-desc">{MODULE_TYPES[type].desc}</div>
                  </div>
                  <span style={{ opacity: 0.5 }}>+</span>
                </button>
              ))}
              {availableTypes.length === 0 && <div className="empty">Alle moduler allerede lagt til</div>}
            </div>
            <button className="picker-close" onClick={() => setPickerOpen(false)}>Lukk</button>
          </div>
        </div>
      )}
    </>
  );
}

function ConfigDevice({ device, hidden, prefs, expanded, onToggleVisible, onToggleMetrics, onToggleMetric }) {
  const cap = device.capabilities || [];
  const allMetricCaps = cap.filter(c => METRIC_DEFS[c]);
  const devicePrefs = prefs[device.id] || {};
  const currentMetrics = devicePrefs.metrics || allMetricCaps;

  return (
    <div className="config-device">
      <div className="config-device-row">
        <input type="checkbox" className="config-device-check" checked={!hidden} onChange={onToggleVisible} />
        <div className="config-device-info">
          <div className="config-device-name">{device.name}</div>
          <div className="config-device-label">{deviceLabel(device, device.capabilitiesObj || {})}</div>
        </div>
        {allMetricCaps.length > 0 && !hidden && (
          <button className="config-metrics-toggle" onClick={onToggleMetrics}>
            {expanded ? "Skjul ▲" : "Målinger ▼"}
          </button>
        )}
      </div>
      {expanded && !hidden && allMetricCaps.length > 0 && (
        <div className="config-caps">
          {allMetricCaps.map(capName => {
            const def = METRIC_DEFS[capName];
            const active = currentMetrics.includes(capName);
            return (
              <label key={capName} className={`config-cap-label ${active ? "active" : ""}`}>
                <input type="checkbox" checked={active}
                  onChange={() => onToggleMetric(capName, allMetricCaps, currentMetrics)} />
                {def.label}
              </label>
            );
          })}
        </div>
      )}
    </div>
  );
}

function allZonesWithDevices(floors, devicesByZone) {
  const result = [];
  const visit = (zone) => {
    if ((devicesByZone[zone.id] || []).length > 0) result.push(zone);
    (zone.children || []).forEach(visit);
  };
  floors.forEach(visit);
  return result;
}

function ZoneColumn({ zone, devices, onToggle, onSetCapability, prefs, onUpdatePrefs }) {
  return (
    <div className="col">
      <div className="col-head">
        <h2 className="col-title">{zone.name}</h2>
        <div className="col-subtitle">{devices.length} enhet{devices.length !== 1 ? "er" : ""}</div>
      </div>
      <DeviceGroups devices={devices} onToggle={onToggle} onSetCapability={onSetCapability}
        prefs={prefs} onUpdatePrefs={onUpdatePrefs} />

function StyringConfig({ floors, devicesByZone, allZones, prefs, onUpdatePrefs, onUpdateStyringPrefs, onClose }) {
  const styringPrefs = prefs._styring || {};
  const hiddenDevices = styringPrefs.hiddenDevices || [];
  const hiddenZones = styringPrefs.hiddenZones || [];
  const [activeTab, setActiveTab] = useState("zones");
  const [expandedMetrics, setExpandedMetrics] = useState({});

  const toggleZone = (zoneId) => {
    const next = hiddenZones.includes(zoneId)
      ? hiddenZones.filter(id => id !== zoneId)
      : [...hiddenZones, zoneId];
    onUpdateStyringPrefs({ ...styringPrefs, hiddenZones: next });
  };

  const toggleDevice = (deviceId) => {
    const next = hiddenDevices.includes(deviceId)
      ? hiddenDevices.filter(id => id !== deviceId)
      : [...hiddenDevices, deviceId];
    onUpdateStyringPrefs({ ...styringPrefs, hiddenDevices: next });
  };

  const toggleMetric = (deviceId, capName, allMetricCaps, currentMetrics) => {
    const next = currentMetrics.includes(capName)
      ? currentMetrics.filter(c => c !== capName)
      : [...currentMetrics, capName];
    const devicePrefs = prefs[deviceId] || {};
    onUpdatePrefs(deviceId, { ...devicePrefs, metrics: next });
  };

  return (
    <div className="config-overlay" onClick={onClose}>
      <div className="config-panel" onClick={e => e.stopPropagation()}>
        <div className="config-head">
          <div className="config-title">Tilpass <em>Styring</em></div>
          <button className="config-close" onClick={onClose}>Lukk</button>
        </div>
        <div className="config-tabs">
          <button className={`config-tab-btn ${activeTab === "zones" ? "active" : ""}`} onClick={() => setActiveTab("zones")}>Soner</button>
          <button className={`config-tab-btn ${activeTab === "devices" ? "active" : ""}`} onClick={() => setActiveTab("devices")}>Enheter</button>
        </div>
        <div className="config-body">
          {activeTab === "zones" && floors.map(floor => {
            const floorCount = devicesInZoneTree(floor, devicesByZone).length;
            if (floorCount === 0) return null;
            return (
              <div key={floor.id} className="config-floor">
                <div className="config-device">
                  <div className="config-device-row">
                    <input type="checkbox" className="config-device-check"
                      checked={!hiddenZones.includes(floor.id)}
                      onChange={() => toggleZone(floor.id)} />
                    <div className="config-device-info">
                      <div className="config-device-name" style={{fontWeight:600}}>{floor.name}</div>
                      <div className="config-device-label">Etasje · {floorCount} enheter</div>
                    </div>
                  </div>
                </div>
                {(floor.children || []).filter(z => devicesInZoneTree(z, devicesByZone).length > 0).map(zone => (
                  <div key={zone.id} style={{paddingLeft: 14}}>
                    <div className="config-device">
                      <div className="config-device-row">
                        <input type="checkbox" className="config-device-check"
                          checked={!hiddenZones.includes(zone.id)}
                          onChange={() => toggleZone(zone.id)} />
                        <div className="config-device-info">
                          <div className="config-device-name">{zone.name}</div>
                          <div className="config-device-label">{devicesInZoneTree(zone, devicesByZone).length} enheter</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
          {activeTab === "devices" && allZones.map(zone => {
            const devices = devicesByZone[zone.id] || [];
            if (devices.length === 0) return null;
            return (
              <div key={zone.id} className="config-floor">
                <div className="config-floor-title">{zone.name}</div>
                {devices.map(device => (
                  <ConfigDevice key={device.id} device={device}
                    hidden={hiddenDevices.includes(device.id)}
                    prefs={prefs} expanded={!!expandedMetrics[device.id]}
                    onToggleVisible={() => toggleDevice(device.id)}
                    onToggleMetrics={() => setExpandedMetrics(prev => ({ ...prev, [device.id]: !prev[device.id] }))}
                    onToggleMetric={(capName, allCaps, cur) => toggleMetric(device.id, capName, allCaps, cur)} />
                ))}
              </div>
            );
          })}
          <div className="config-hint">Innstillinger lagres automatisk</div>
        </div>
      </div>
    </div>
  );
}

// ==================== STYRING VIEW ====================
function StyringView({ floors, devicesByZone, onToggle, onSetCapability, prefs, onUpdatePrefs, onUpdateStyringPrefs }) {
  const [showConfig, setShowConfig] = useState(false);
  const styringPrefs = prefs._styring || {};
  const hiddenDevices = styringPrefs.hiddenDevices || [];
  const hiddenZones = styringPrefs.hiddenZones || [];

  const filteredDevicesByZone = useMemo(() => {
    if (hiddenDevices.length === 0) return devicesByZone;
    const result = {};
    Object.entries(devicesByZone).forEach(([zoneId, devs]) => {
      result[zoneId] = devs.filter(d => !hiddenDevices.includes(d.id));
    });
    return result;
  }, [devicesByZone, hiddenDevices]);

  // Remove hidden zones from the tree before passing to FloorColumn
  const filteredFloors = useMemo(() => {
    const filterTree = (zone) => {
      if (hiddenZones.includes(zone.id)) return null;
      const children = (zone.children || []).map(filterTree).filter(Boolean);
      return { ...zone, children };
    };
    return floors.map(filterTree).filter(Boolean);
  }, [floors, hiddenZones]);

  const visibleFloors = filteredFloors.filter(z => devicesInZoneTree(z, filteredDevicesByZone).length > 0);
  const colTemplate = visibleFloors.length === 0 ? "1fr" : visibleFloors.map(() => "1fr").join(" ");

  return (
    <>
      <div className="styring-toolbar">
        <button className={`tilpass-btn ${showConfig ? "active" : ""}`} onClick={() => setShowConfig(v => !v)}>
          Tilpass visning
        </button>
      </div>
      <main className="columns" style={{ gridTemplateColumns: colTemplate }}>
        {visibleFloors.map((floor, idx) => (
          <FloorColumn key={floor.id} floor={floor} idx={idx} devicesByZone={filteredDevicesByZone}
            onToggle={onToggle} onSetCapability={onSetCapability} prefs={prefs} onUpdatePrefs={onUpdatePrefs} />
        ))}
        {visibleFloors.length === 0 && <div className="empty">Ingen soner å vise · åpne "Tilpass visning" for å legge til</div>}
      </main>
      {showConfig && (
        <StyringConfig
          floors={floors} devicesByZone={devicesByZone}
          allZones={allZonesWithDevices(floors, devicesByZone)}
          prefs={prefs} onUpdatePrefs={onUpdatePrefs}
          onUpdateStyringPrefs={onUpdateStyringPrefs}
          onClose={() => setShowConfig(false)} />
      )}
    </>
  );
}

// ==================== SIKKERHET VIEW ====================
function SecurityView({ devices, zones, events, onToggle, onSetCapability, prefs, onUpdatePrefs }) {
  const motionDevices = devices.filter(d => d.capabilitiesObj?.alarm_motion != null);
  const contactDevices = devices.filter(d => d.capabilitiesObj?.alarm_contact != null);
  const smokeWaterDevices = devices.filter(d =>
    d.capabilitiesObj?.alarm_smoke != null ||
    d.capabilitiesObj?.alarm_water != null ||
    d.capabilitiesObj?.alarm_co != null
  );
  const presenceDevices = devices.filter(d => {
    const n = (d.name || "").toLowerCase();
    return d.class === "presence" || d.class === "camera" ||
           n.includes("kamera") || n.includes("camera");
  });

  const activeMotion = motionDevices.filter(d => d.capabilitiesObj?.alarm_motion?.value).length;
  const openContacts = contactDevices.filter(d => d.capabilitiesObj?.alarm_contact?.value).length;
  const activeAlarms = smokeWaterDevices.filter(d =>
    d.capabilitiesObj?.alarm_smoke?.value || d.capabilitiesObj?.alarm_water?.value || d.capabilitiesObj?.alarm_co?.value
  ).length;

  const totalAlerts = activeAlarms + openContacts;
  const allOk = totalAlerts === 0 && activeMotion === 0;

  const Section = ({ title, icon, devices: secDevices }) => {
    if (secDevices.length === 0) return null;
    return (
      <div className="sec-section">
        <div className="sec-section-head">
          <h2 className="sec-section-title"><em>{icon}</em>{title}</h2>
          <span className="sec-section-count">{secDevices.length}</span>
        </div>
        <div className="grid-wide">
          {secDevices.map(d => (
            <DeviceCard key={d.id} device={d} onToggle={onToggle} onSetCapability={onSetCapability} prefs={prefs} onUpdatePrefs={onUpdatePrefs} />
          ))}
        </div>
      </div>
    );
  };

  return (
    <div className="single-view">
      <div className={`security-status ${!allOk ? "alert" : ""}`}>
        <div className="security-status-icon">{allOk ? "✓" : "!"}</div>
        <div className="security-status-text">
          <div className="security-status-headline">
            {allOk ? <>Alt <em>vel</em></>
              : totalAlerts > 0 ? <>{totalAlerts} <em>varsler</em></>
              : <>Bevegelse <em>oppdaget</em></>}
          </div>
          <div className="security-status-detail">
            {[
              activeAlarms > 0 && `${activeAlarms} alarm${activeAlarms !== 1 ? "er" : ""}`,
              openContacts > 0 && `${openContacts} åpne dører/vinduer`,
              activeMotion > 0 && `${activeMotion} aktive bevegelser`,
              allOk && "Ingen sensorer utløst akkurat nå"
            ].filter(Boolean).join(" · ")}
          </div>
        </div>
      </div>

      <Section title="Røyk og lekkasje" icon="α" devices={smokeWaterDevices} />
      <Section title="Vinduer og dører" icon="β" devices={contactDevices} />
      <Section title="Bevegelse" icon="γ" devices={motionDevices} />
      <Section title="Tilstede / kamera" icon="δ" devices={presenceDevices} />

      <div className="sec-section">
        <div className="sec-section-head">
          <h2 className="sec-section-title"><em>ε</em>Hendelseslogg</h2>
          <span className="sec-section-count">{events.length} siste</span>
        </div>
        {events.length === 0 ? (
          <div className="empty">Ingen registrerte hendelser ennå · loggen bygges fra og med oppstart</div>
        ) : (
          <div className="event-log">
            {events.map(ev => {
              const zoneName = zones[ev.zoneId]?.name || "";
              return (
                <div key={ev.id} className={`event-row ${ev.severity === "alert" ? "alert" : ""}`}>
                  <span className="event-time">{timeAgo(ev.timestamp)}</span>
                  <span className="event-icon">{ev.icon}</span>
                  <span className="event-text"><strong>{ev.deviceName}</strong> {ev.description}</span>
                  {zoneName && <span className="event-zone">{zoneName}</span>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ==================== FLOW ROW (for flows tab) ====================
function FlowRow({ flow, onRun }) {
  const [running, setRunning] = useState(false);
  const [ran, setRan] = useState(false);
  const handle = async () => {
    setRunning(true);
    try { await onRun(flow.id); } catch (e) { console.error(e); }
    setRunning(false);
    setRan(true);
    setTimeout(() => setRan(false), 2000);
  };
  return (
    <div className="flow-row">
      <span className="flow-name">{flow.name}</span>
      <button className={`run-btn ${ran ? "done" : ""}`} onClick={handle} disabled={running || flow.enabled === false}>
        {running ? "Kjører" : ran ? "Kjørt ✓" : "Kjør"}
      </button>
    </div>
  );
}

// ==================== DASHBOARD ====================
function Dashboard({ homeyName, onLogout }) {
  const profileName = useMemo(() => new URLSearchParams(window.location.search).get('profile') || 'default', []);
  const [devices, setDevices] = useState([]);
  const [flows, setFlows] = useState([]);
  const [zones, setZones] = useState({});
  const [prefs, setPrefs] = useState({});
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [tab, setTab] = useState("hjem");
  const [isEditHome, setIsEditHome] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [events, setEvents] = useState([]);
  const previousDevicesRef = useRef({});

  const [doorbellAlert, setDoorbellAlert] = useState(null);
  const [doorbellCountdown, setDoorbellCountdown] = useState(60);
  const [doorbellTick, setDoorbellTick] = useState(0);
  const [doorbellImgError, setDoorbellImgError] = useState(false);
  const lastSeenDingTs = useRef(0);

  useEffect(() => {
    const poll = setInterval(async () => {
      try {
        const r = await fetch("/camera/ring/latest-ding");
        if (!r.ok) return;
        const data = await r.json();
        if (data.ding && data.timestamp > lastSeenDingTs.current) {
          lastSeenDingTs.current = data.timestamp;
          setDoorbellAlert(data);
          setDoorbellCountdown(60);
          setDoorbellTick(0);
          setDoorbellImgError(false);
        }
      } catch {}
    }, 2000);
    return () => clearInterval(poll);
  }, []);

  useEffect(() => {
    if (!doorbellAlert) return;
    const timer = setInterval(() => {
      setDoorbellCountdown(n => {
        if (n <= 1) { setDoorbellAlert(null); return 60; }
        return n - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [doorbellAlert]);

  useEffect(() => {
    if (!doorbellAlert) return;
    const t = setInterval(() => { setDoorbellTick(n => n + 1); setDoorbellImgError(false); }, 5000);
    return () => clearInterval(t);
  }, [doorbellAlert]);

  // Sammenlign tidligere og nye enhets-tilstander, og oppdager hendelser
  const detectEvents = useCallback((newDevices) => {
    const prev = previousDevicesRef.current;
    const newEvents = [];
    const watch = [
      { cap: "alarm_motion", desc: "registrerte bevegelse", icon: "👁", severity: "info" },
      { cap: "alarm_contact", desc: "ble åpnet", icon: "🚪", severity: "alert" },
      { cap: "alarm_smoke", desc: "varslet røyk", icon: "🔥", severity: "alert" },
      { cap: "alarm_water", desc: "registrerte vann", icon: "💧", severity: "alert" },
      { cap: "alarm_co", desc: "varslet CO", icon: "☠", severity: "alert" },
    ];

    newDevices.forEach(d => {
      const oldD = prev[d.id];
      if (!oldD) return;
      watch.forEach(({ cap, desc, icon, severity }) => {
        const oldVal = oldD.capabilitiesObj?.[cap]?.value;
        const newVal = d.capabilitiesObj?.[cap]?.value;
        if (oldVal === false && newVal === true) {
          newEvents.push({
            id: `${d.id}-${cap}-${Date.now()}-${Math.random()}`,
            deviceId: d.id, deviceName: d.name, zoneId: d.zone,
            description: desc, icon, severity,
            timestamp: Date.now(),
          });
        }
        // Spesialtilfelle: kontakt lukket
        if (cap === "alarm_contact" && oldVal === true && newVal === false) {
          newEvents.push({
            id: `${d.id}-${cap}-close-${Date.now()}-${Math.random()}`,
            deviceId: d.id, deviceName: d.name, zoneId: d.zone,
            description: "ble lukket", icon: "🚪", severity: "info",
            timestamp: Date.now(),
          });
        }
      });
    });

    if (newEvents.length > 0) {
      setEvents(prev => [...newEvents, ...prev].slice(0, 50));
    }

    const map = {};
    newDevices.forEach(d => { map[d.id] = d; });
    previousDevicesRef.current = map;
  }, []);

  const load = useCallback(async () => {
    setLoading(true);
    setError("");
    try {
      const [devMap, flowMap, zoneMap, prefsData] = await Promise.all([
        api("/homey/manager/devices/device/"),
        api("/homey/manager/flow/flow/"),
        api("/homey/manager/zones/zone/"),
        api("/prefs").catch(() => ({})),
      ]);
      setZones(zoneMap);
      setPrefs(prefsData || {});
      const devList = Object.values(devMap).map(d => ({
        ...d, zoneId: d.zone, zoneName: zoneMap[d.zone]?.name || null,
      }));
      detectEvents(devList);
      setDevices(devList);
      setFlows(Object.values(flowMap));
      setLastRefresh(new Date());
    } catch (e) {
      setError("Feil: " + e.message);
    } finally {
      setLoading(false);
    }
  }, [detectEvents]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    const id = setInterval(load, 15000);
    return () => clearInterval(id);
  }, [load]);

  const handleSetCapability = async (id, capability, value) => {
    try {
      await api(`/homey/manager/devices/device/${id}/capability/${capability}`, {
        method: "PUT", body: JSON.stringify({ value }),
      });
      setDevices(prev => prev.map(d => d.id === id
        ? { ...d, capabilitiesObj: { ...d.capabilitiesObj, [capability]: { ...d.capabilitiesObj?.[capability], value } } }
        : d));
    } catch (e) { console.error(e); }
  };

  const handleToggle = (id, value) => handleSetCapability(id, "onoff", value);

  const handleUpdatePrefs = async (deviceId, devicePrefs) => {
    const newPrefs = { ...prefs, [deviceId]: devicePrefs };
    setPrefs(newPrefs);
    try { await api("/prefs", { method: "PUT", body: JSON.stringify(newPrefs) }); }
    catch (e) { console.error("Kunne ikke lagre prefs:", e); }
  };

  const handleUpdateGlobalPrefs = async (newGlobal) => {
    const newPrefs = { ...prefs, _global: newGlobal };
    setPrefs(newPrefs);
    try { await api("/prefs", { method: "PUT", body: JSON.stringify(newPrefs) }); }
    catch (e) { console.error("Kunne ikke lagre prefs:", e); }
  };

  const handleUpdateStyringPrefs = async (styringPrefs) => {
    const newPrefs = { ...prefs, _styring: styringPrefs };
    setPrefs(newPrefs);
    try { await api("/prefs", { method: "PUT", body: JSON.stringify(newPrefs) }); }
    catch (e) { console.error("Kunne ikke lagre styring-prefs:", e); }
  };

  const handleRunFlow = async (id) => {
    await api(`/homey/manager/flow/flow/${id}/trigger`, { method: "POST", body: JSON.stringify({}) });
  };

  const handleLogout = async () => {
    await fetch("/auth/logout", { method: "GET" });
    onLogout();
  };

  const { tree, devicesByZone } = useMemo(() => {
    const t = buildZoneTree(zones);
    const map = {};
    devices.forEach(d => {
      if (!d.zoneId) return;
      (map[d.zoneId] = map[d.zoneId] || []).push(d);
    });
    return { tree: t, devicesByZone: map };
  }, [zones, devices]);

  const roots = tree.filter(z => devicesInZoneTree(z, devicesByZone).length > 0);
  // Homey har én rot-sone ("Hjem") med etasjer som barn. Bruk alltid barna som kolonner.
  const floors = (roots.length === 1 && (roots[0].children || []).length > 0)
    ? (roots[0].children || []).filter(z => devicesInZoneTree(z, devicesByZone).length > 0)
    : roots;
  const globalPrefs = prefs._global || {};

  const tabs = [
    { key: "hjem", label: "Hjem", icon: "i." },
    { key: "styring", label: "Styring", icon: "ii." },
    { key: "sikkerhet", label: "Sikkerhet", icon: "iii." },
    { key: "alle", label: `Alle (${devices.length})` },
    { key: "flows", label: `Flows (${flows.length})` },
  ];

  return (
    <>
      <header className="masthead">
        <div className="brand">
          <div className="brand-mark">Hjem<em>et</em></div>
          <div className="brand-tag">
            {lastRefresh ? lastRefresh.toLocaleDateString("no-NO", { weekday: "long", day: "numeric", month: "long" }) : "Laster…"}
            {profileName !== 'default' && <span style={{ marginLeft: 8, padding: "1px 7px", borderRadius: 99, background: "var(--surface-soft)", color: "var(--ink-soft)", fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>{profileName}</span>}
          </div>
        </div>
        <ClockDisplay />
        <div className="masthead-right">
          <div className="meta">
            <div className="meta-line"><span className="pulse"></span> {homeyName || "Synkronisert"}</div>
          </div>
          <div className="actions">
            <button className={`pill-btn ${isEditHome ? "primary" : ""}`} onClick={() => setIsEditHome(e => !e)}>
              {isEditHome ? "Ferdig" : "Rediger"}
            </button>
            <button className={`icon-btn ${loading ? "spinning" : ""}`} onClick={load} disabled={loading} title="Oppdater">↻</button>
            <button className="icon-btn" onClick={handleLogout} title="Logg ut">✕</button>
          </div>
        </div>
      </header>

      <div className="tab-content">
        {error && <div className="error-banner">{error}</div>}
        <HomeView
          devices={devices} flows={flows} zones={zones} tree={tree} devicesByZone={devicesByZone}
          prefs={prefs} globalPrefs={globalPrefs} onUpdateGlobalPrefs={handleUpdateGlobalPrefs}
          onSetCapability={handleSetCapability} onToggle={handleToggle}
          onUpdatePrefs={handleUpdatePrefs} onRunFlow={handleRunFlow}
          isEdit={isEditHome} profileName={profileName}
        />
      </div>

      {doorbellAlert && (
        <div className="doorbell-overlay" onClick={() => setDoorbellAlert(null)}>
          <div className="doorbell-panel" onClick={e => e.stopPropagation()}>
            <div className="doorbell-head">
              <div>
                <div className="doorbell-title">Noen <em>ringer på!</em></div>
                <div className="doorbell-sub">{doorbellAlert.cameraName}</div>
              </div>
              <button className="config-close" onClick={() => setDoorbellAlert(null)}>Lukk</button>
            </div>
            <div className="doorbell-progress">
              <div className="doorbell-progress-bar" style={{ width: `${(doorbellCountdown / 60) * 100}%` }} />
            </div>
            {doorbellImgError ? (
              <div className="doorbell-img-offline">Snapshot utilgjengelig</div>
            ) : (
              <img
                className="doorbell-img"
                src={`/camera/ring/${doorbellAlert.cameraId}?t=${doorbellTick}`}
                alt={doorbellAlert.cameraName}
                onError={() => setDoorbellImgError(true)}
                onLoad={() => setDoorbellImgError(false)}
              />
            )}
            <div className="doorbell-footer">
              <div className="doorbell-countdown">Lukkes om <strong>{doorbellCountdown}s</strong></div>
              <button className="pill-btn" onClick={() => setDoorbellAlert(null)}>Lukk nå</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function ClockDisplay() {
  const [time, setTime] = useState(() => new Date());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  const h = String(time.getHours()).padStart(2, "0");
  const m = String(time.getMinutes()).padStart(2, "0");
  return <div className="masthead-clock">{h}<em>:{m}</em></div>;
}

function App() {
  const [auth, setAuth] = useState(null);
  const [error, setError] = useState("");

  const checkAuth = useCallback(async () => {
    try {
      const data = await api("/auth/status");
      setAuth(data);
    } catch (e) {
      setError(e.message);
      setAuth({ authenticated: false });
    }
  }, []);

  useEffect(() => { checkAuth(); }, [checkAuth]);

  if (auth === null) return <div className="setup"><div className="setup-card">Laster…</div></div>;
  if (!auth.authenticated) return <SetupScreen error={error} />;
  return (
    <div className="frame">
      <Dashboard homeyName={auth.homeyName} onLogout={() => setAuth({ authenticated: false })} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>

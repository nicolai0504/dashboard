<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<title>Hjemmet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light;
    /* Lys & luftig Apple-palett */
    --bg: #fbf9f4;
    --surface: #ffffff;
    --surface-soft: #f7f3ec;
    --surface-deep: #efeae0;
    /* Legacy aliases */
    --paper: #fbf9f4;
    --paper-deep: #efeae0;
    --ink: #1d1b18;
    --ink-soft: #595550;
    --ink-mute: #a39d92;
    --moss: #527558;
    --moss-soft: #7a9b80;
    --moss-deep: #3d5942;
    --terracotta: #d28968;
    --terracotta-soft: #e8b89a;
    --gold: #c9a268;
    --red: #c25a4a;
    --line: rgba(29, 27, 24, 0.06);
    --line-soft: rgba(29, 27, 24, 0.03);
    --shadow-sm: 0 1px 2px rgba(29, 27, 24, 0.04), 0 1px 1px rgba(29, 27, 24, 0.02);
    --shadow-md: 0 4px 16px -4px rgba(29, 27, 24, 0.06), 0 2px 6px -2px rgba(29, 27, 24, 0.04);
    --shadow-lg: 0 12px 40px -12px rgba(29, 27, 24, 0.1), 0 4px 12px -4px rgba(29, 27, 24, 0.05);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;

    --font-display: 'Fraunces', 'Times New Roman', serif;
    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    height: 100dvh;
    overflow: hidden;
    background-image:
      radial-gradient(at 0% 0%, rgba(210, 137, 104, 0.04) 0%, transparent 50%),
      radial-gradient(at 100% 100%, rgba(82, 117, 88, 0.04) 0%, transparent 50%);
  }
  a { color: var(--terracotta); text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: 0.5; }

  .frame { padding: 0 20px; position: relative; z-index: 2; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* SETUP */
  .setup { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .setup-card { background: var(--surface); border: none; border-radius: var(--radius-lg); padding: 48px; max-width: 500px; width: 100%; box-shadow: var(--shadow-lg); }
  .setup-mark { font-family: var(--font-display); font-weight: 300; font-size: 56px; line-height: 1; letter-spacing: -0.04em; font-variation-settings: 'opsz' 144, 'SOFT' 30; margin-bottom: 4px; }
  .setup-mark em { font-style: italic; font-weight: 400; color: var(--terracotta); }
  .setup-tag { font-size: 12px; color: var(--ink-mute); font-weight: 500; margin-bottom: 28px; }
  .setup-text { font-size: 13px; line-height: 1.6; color: var(--ink-soft); margin-bottom: 24px; }
  .setup-text em { font-family: var(--font-display); font-style: italic; color: var(--terracotta); }
  .login-btn { display: block; width: 100%; padding: 14px; text-align: center; background: var(--ink); color: var(--surface); border: none; cursor: pointer; font-family: var(--font-body); font-size: 12px; font-weight: 500; border-radius: var(--radius-sm); transition: background .2s, transform .2s; }
  .error-box { background: rgba(194, 90, 74, 0.08); color: var(--red); padding: 10px 14px; font-size: 11px; margin-top: 16px; border-radius: var(--radius-sm); border-left: 2px solid var(--red); }

  /* MASTHEAD */
  .masthead { padding: 16px 0 12px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; flex-shrink: 0; }
  .masthead-clock { font-family: var(--font-display); font-weight: 300; font-size: 36px; letter-spacing: -0.045em; line-height: 1; font-variation-settings: 'opsz' 144, 'SOFT' 30; text-align: center; flex: 1; }
  .masthead-clock em { font-style: italic; color: var(--terracotta); font-weight: 400; }
  .masthead-right { display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand-mark { font-family: var(--font-display); font-weight: 300; font-size: 28px; line-height: 1; letter-spacing: -0.03em; font-variation-settings: 'opsz' 144, 'SOFT' 30; }
  .brand-mark em { font-style: italic; font-weight: 400; color: var(--terracotta); }
  .brand-tag { font-size: 12px; color: var(--ink-mute); font-weight: 500; }
  .meta { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--ink-soft); flex: 1; justify-content: flex-end; }
  .meta-line { display: flex; align-items: center; gap: 6px; }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--moss); box-shadow: 0 0 0 3px rgba(82, 117, 88, 0.15); animation: pulse 2.5s infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 0 6px rgba(82, 117, 88, 0); } }
  .actions { display: flex; gap: 8px; }
  .icon-btn { width: 34px; height: 34px; border: none; background: var(--surface); border-radius: 50%; cursor: pointer; color: var(--ink-soft); display: inline-flex; align-items: center; justify-content: center; transition: all .25s cubic-bezier(.2, .7, .2, 1); font-size: 14px; box-shadow: var(--shadow-sm); }
  .icon-btn.active { background: var(--terracotta); color: var(--surface); box-shadow: var(--shadow-sm); }
  .icon-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TABS */
  .tabs-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-shrink: 0; flex-wrap: wrap; }
  .tabs-bar .tabs { margin-bottom: 0; }
  .tabs-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .tabs { display: inline-flex; gap: 2px; padding: 4px; background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); overflow-x: auto; flex-shrink: 0; align-items: center; }
  .tab { background: transparent; border: none; padding: 8px 18px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--ink-mute); cursor: pointer; border-radius: var(--radius-xl); white-space: nowrap; transition: all .25s cubic-bezier(.2, .7, .2, 1); }
  .tab.active { color: var(--ink); background: var(--surface-soft); }
  .tab em { font-family: var(--font-display); font-style: italic; font-weight: 400; color: var(--terracotta); margin-right: 4px; font-size: 13px; }

  .error-banner { background: rgba(194, 90, 74, 0.08); color: var(--red); padding: 8px 16px; font-size: 11px; border-radius: var(--radius-sm); border-left: 2px solid var(--red); margin: 10px 0; }

  /* ====== HOME VIEW (modules) ====== */
  .home-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 14px; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
  .home-toolbar-info { font-size: 12px; color: var(--ink-mute); font-style: italic; }
  .edit-actions { display: flex; gap: 8px; }
  .pill-btn { background: var(--surface); border: none; padding: 8px 18px; font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--ink-soft); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); transition: all .25s cubic-bezier(.2, .7, .2, 1); }
  .pill-btn.primary { background: var(--ink); color: var(--surface); }
  .pill-btn.terracotta { background: var(--terracotta); color: var(--surface); }

  .home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding-bottom: 14px; flex: 1; min-height: 0; overflow-y: auto; align-items: start; grid-auto-flow: row dense; }
  .home-masonry { display: flex; flex-direction: column; gap: 14px; padding-top: 4px; padding-bottom: 14px; flex: 1; min-height: 0; overflow: hidden; }
  .home-masonry-row { display: flex; gap: 14px; align-items: stretch; flex: 1; min-height: 0; }
  .home-masonry-col { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0; min-height: 0; }
  .home-masonry-col > .module:last-child { flex: 1; }
  .module {
    background: var(--surface);
    border: none;
    border-radius: var(--radius-md);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    min-height: 0;
    box-shadow: var(--shadow-sm);
    transition: transform .25s cubic-bezier(.2, .7, .2, 1), box-shadow .25s;
  }
  .module.span-2 { grid-column: span 2; }
  .module.span-3 { grid-column: span 3; }
  .module-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }
  .module-title {
    font-family: var(--font-display);
    font-weight: 400; font-style: italic;
    font-size: 20px; letter-spacing: -0.015em;
    line-height: 1;
  }
  .module-title em { font-weight: 300; color: var(--terracotta); margin-right: 4px; }
  .module-sub { font-size: 11px; color: var(--ink-mute); font-weight: 500; }

  /* Edit mode */
  .edit-mode .module {
    cursor: grab;
    border: 1.5px dashed var(--terracotta);
    box-shadow: none;
  }
  .edit-mode .module:hover { transform: none; box-shadow: none; }
  .edit-mode .module:active { cursor: grabbing; }
  .edit-mode .module.dragging { opacity: 0.4; }
  .edit-mode .module.drop-target { border-style: solid; box-shadow: 0 0 0 2px var(--terracotta); }
  .module-edit-controls {
    display: none;
    position: absolute;
    top: 8px; right: 8px;
    gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-md);
  }
  .edit-mode .module-edit-controls { display: flex; }
  .edit-btn {
    width: 24px; height: 24px;
    background: var(--surface-soft);
    border: none;
    border-radius: 6px;
    color: var(--ink); cursor: pointer;
    font-size: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .edit-btn:hover { background: var(--ink); color: var(--surface); }
  .edit-btn.danger:hover { background: var(--red); color: var(--surface); }

  /* Module settings drawer */
  .module-settings-drawer {
    background: var(--surface-soft);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--terracotta);
    padding: 10px 12px;
    margin-top: 4px;
  }
  .settings-title { font-size: 9px; color: var(--terracotta); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 8px; font-weight: 600; }
  .settings-checks { display: flex; flex-wrap: wrap; gap: 6px; }
  .settings-check { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; padding: 4px 9px; background: var(--surface); border: none; border-radius: var(--radius-sm); cursor: pointer; user-select: none; box-shadow: var(--shadow-sm); }
  .settings-check input { cursor: pointer; accent-color: var(--terracotta); margin: 0; }
  .settings-select {
    width: 100%; padding: 7px 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 12px;
    color: var(--ink);
  }
  .settings-hint { font-size: 10px; color: var(--ink-mute); margin-top: 6px; font-style: italic; }

  /* Module picker (overlay) */
  .picker-backdrop {
    position: fixed; inset: 0;
    background: rgba(29, 27, 24, 0.45);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .picker {
    background: var(--surface);
    border: none;
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 480px; width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .picker-title {
    font-family: var(--font-display);
    font-weight: 400; font-style: italic;
    font-size: 24px; letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .picker-sub { font-size: 11px; color: var(--ink-mute); font-weight: 500; margin-bottom: 18px; }
  .picker-list { display: flex; flex-direction: column; gap: 8px; }
  .picker-item {
    background: var(--surface-soft); border: none;
    border-radius: var(--radius-sm);
    padding: 12px 16px; cursor: pointer;
    font-family: var(--font-body); color: var(--ink);
    transition: all .2s cubic-bezier(.2, .7, .2, 1);
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    text-align: left;
  }
  .picker-item:disabled { opacity: 0.4; }
  .picker-item-name { font-family: var(--font-display); font-style: italic; font-size: 15px; }
  .picker-item-desc { font-size: 11px; color: var(--ink-mute); }

  .picker-close {
    margin-top: 16px; width: 100%;
    background: var(--surface-soft); border: none;
    border-radius: var(--radius-xl);
    padding: 10px; cursor: pointer;
    font-family: var(--font-body); font-size: 11px; font-weight: 500;
    color: var(--ink-soft);
    transition: all .2s;
  }

  /* HAN module */
  .han-value { font-family: var(--font-display); font-weight: 300; font-size: 52px; letter-spacing: -0.045em; line-height: 1; font-variation-settings: 'opsz' 144, 'SOFT' 30; margin-top: 2px; }
  .han-value em { font-style: italic; color: var(--terracotta); font-weight: 400; }
  .han-value .unit { font-size: 0.32em; font-style: italic; color: var(--ink-mute); letter-spacing: 0; margin-left: 4px; font-weight: 400; }
  .han-detail { font-size: 11px; color: var(--ink-mute); font-style: italic; }
  .sparkline { width: 100%; height: 40px; margin-top: 6px; }
  .sparkline path { fill: none; stroke: var(--terracotta); stroke-width: 1.5; stroke-linecap: round; }
  .sparkline .area { fill: var(--terracotta); opacity: 0.1; stroke: none; }

  /* Combined HAN+Weather module */
  .han-weather-split { display: flex; gap: 0; margin-top: 4px; align-self: stretch; }
  .han-weather-half { flex: 1; min-width: 0; }
  .han-weather-half + .han-weather-half { border-left: 1px solid var(--line); padding-left: 14px; }
  .wx-blocks { display: flex; flex-direction: row; gap: 20px; padding-top: 8px; border-top: 1px solid var(--line); align-self: stretch; }
  .wx-block { flex: 1; min-width: 0; background: var(--surface-soft); border-radius: var(--radius-sm); padding: 8px 8px 6px; }
  .wx-block-time { font-size: 9px; color: var(--ink-mute); margin-bottom: 5px; }
  .wx-block-icon { font-size: 20px; line-height: 1; margin-bottom: 3px; }
  .wx-block-condition { font-family: var(--font-display); font-style: italic; font-size: 11px; color: var(--ink-soft); line-height: 1.2; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wx-block-temps { display: flex; align-items: baseline; gap: 2px; margin-bottom: 3px; }
  .wx-block-lo { font-family: var(--font-display); font-size: 13px; font-weight: 400; letter-spacing: -0.02em; }
  .wx-block-sep { font-size: 9px; color: var(--ink-mute); }
  .wx-block-hi { font-family: var(--font-display); font-size: 13px; font-weight: 400; letter-spacing: -0.02em; color: var(--terracotta); font-style: italic; }
  .wx-block-meta { font-size: 9px; color: var(--ink-mute); display: flex; gap: 4px; flex-wrap: nowrap; white-space: nowrap; overflow: hidden; }

  /* Weather module */
  .weather-main { display: flex; align-items: baseline; gap: 8px; margin-top: 4px; }
  .weather-temp { font-family: var(--font-display); font-weight: 300; font-size: 52px; letter-spacing: -0.045em; line-height: 1; font-variation-settings: 'opsz' 144, 'SOFT' 30; }
  .weather-temp em { font-style: italic; color: var(--terracotta); font-weight: 400; }
  .weather-detail { font-size: 11px; color: var(--ink-mute); font-style: italic; line-height: 1.4; }
  .weather-detail span { color: var(--moss); font-style: normal; }
  .weather-mini { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
  .weather-mini .mini-metric { display: flex; flex-direction: column; gap: 2px; }
  .weather-mini .mini-value { font-family: var(--font-display); font-weight: 400; font-size: 17px; letter-spacing: -0.02em; line-height: 1; }
  .weather-mini .mini-label { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-mute); }

  /* Transit module */
  .transit-row { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--line); }
  .transit-row:last-child { border-bottom: none; }
  .transit-line { font-family: var(--font-display); font-weight: 400; font-size: 12px; min-width: 44px; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .transit-mode-icon { font-size: 11px; line-height: 1; flex-shrink: 0; }
  .transit-line.bus { color: var(--terracotta); }
  .transit-line.metro { color: var(--moss); }
  .transit-label { flex: 1; font-size: 11px; color: var(--ink-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .transit-times { display: flex; gap: 8px; flex-shrink: 0; }
  .transit-time { font-family: var(--font-display); font-weight: 400; font-size: 13px; letter-spacing: -0.01em; }
  .transit-time.now { color: var(--moss); font-style: italic; }
  .transit-time.soon { color: var(--terracotta); }
  .transit-sep { font-size: 10px; color: var(--ink-mute); opacity: 0.3; align-self: center; }

  /* Camera module */
  .camera-img { width: 100%; display: block; object-fit: cover; background: var(--surface-deep); aspect-ratio: 16/9; border-radius: var(--radius-sm); }
  .camera-offline { display: flex; align-items: center; justify-content: center; min-height: 80px; background: var(--surface-soft); border-radius: var(--radius-sm); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.15em; font-style: italic; }
  .camera-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
  .camera-grid-cell { position: relative; border-radius: var(--radius-sm); overflow: hidden; }
  .camera-grid-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--surface-deep); }
  .camera-grid-label { position: absolute; bottom: 4px; left: 5px; font-size: 8px; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.15em; text-shadow: 0 1px 3px rgba(0,0,0,0.9); pointer-events: none; }
  .camera-grid-offline { aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; background: var(--surface-deep); font-size: 9px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.15em; font-style: italic; text-align: center; padding: 4px; }

  /* Doorbell overlay */
  .doorbell-overlay { position: fixed; inset: 0; background: rgba(29, 27, 24, 0.75); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(6px); }
  .doorbell-panel { background: var(--surface); border: none; border-radius: var(--radius-lg); max-width: 440px; width: 100%; box-shadow: var(--shadow-lg); overflow: hidden; }
  .doorbell-head { padding: 18px 22px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .doorbell-title { font-family: var(--font-display); font-weight: 300; font-style: italic; font-size: 22px; letter-spacing: -0.02em; line-height: 1.1; }
  .doorbell-title em { color: var(--terracotta); font-weight: 400; }
  .doorbell-sub { font-size: 11px; color: var(--ink-mute); font-weight: 500; margin-top: 4px; }
  .doorbell-progress { height: 3px; background: var(--line); }
  .doorbell-progress-bar { height: 100%; background: var(--terracotta); transition: width 1s linear; }
  .doorbell-img { width: 100%; display: block; object-fit: cover; background: var(--surface-deep); min-height: 180px; max-height: 320px; }
  .doorbell-img-offline { display: flex; align-items: center; justify-content: center; min-height: 180px; background: var(--surface-soft); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.15em; font-style: italic; }
  .doorbell-footer { padding: 12px 22px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-top: 1px solid var(--line); }
  .doorbell-countdown { font-size: 11px; color: var(--ink-mute); font-style: italic; }
  .doorbell-countdown strong { font-family: var(--font-display); font-style: italic; color: var(--terracotta); font-size: 15px; font-weight: 400; }

  /* Calendar module */
  .cal-list { display: flex; flex-direction: column; }
  .cal-event { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--line); align-items: flex-start; }
  .cal-event:last-child { border-bottom: none; }
  .cal-time { font-family: var(--font-display); font-style: italic; font-size: 13px; color: var(--terracotta); flex-shrink: 0; min-width: 64px; line-height: 1.3; }
  .cal-time.allday { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; font-style: normal; color: var(--ink-mute); padding-top: 2px; }
  .cal-body { flex: 1; min-width: 0; }
  .cal-title { font-size: 13px; font-weight: 500; line-height: 1.3; color: var(--ink); }
  .cal-location { font-size: 11px; color: var(--ink-mute); margin-top: 1px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal-duration { font-size: 10px; color: var(--ink-mute); margin-top: 1px; }

  /* Scenes module */
  .scene-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .scene-btn { width: 100%; background: var(--surface-soft); border: none; border-radius: var(--radius-sm); padding: 10px 12px; text-align: left; cursor: pointer; font-family: var(--font-body); color: var(--ink); transition: all .2s cubic-bezier(.2, .7, .2, 1); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .scene-btn:hover:not(:disabled) { background: var(--surface-deep); }
  .scene-btn.ran { background: var(--moss); color: var(--surface); }
  .scene-btn.failed { background: rgba(194, 90, 74, 0.12); color: var(--red); }
  .scene-name { font-family: var(--font-display); font-style: italic; font-size: 15px; font-weight: 400; }
  .scene-arrow { font-size: 12px; opacity: 0.4; transition: opacity .2s, transform .2s; }

  /* Favorites module */
  .favorites-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .favorites-grid > .card { padding: 14px 16px; border-radius: var(--radius-sm); }

  /* Zones overview module */
  .zones-overview { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .zone-tile { min-width: 0; display: flex; flex-direction: row; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--line); }
  .zone-tile:last-child { border-bottom: none; }
  .zone-tile:hover { background: var(--surface-soft); }
  .zone-tile-name { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 13px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .zone-tile-stats { display: flex; gap: 10px; flex-shrink: 0; align-items: center; }
  .zone-tile-stat { display: flex; align-items: baseline; gap: 1px; }
  .zone-tile-val { font-family: var(--font-display); font-weight: 400; font-size: 12px; letter-spacing: -0.02em; line-height: 1; color: var(--ink-soft); }
  .zone-tile-val em { font-style: italic; color: var(--moss); }
  .zone-tile-val.alert { color: var(--red); }
  .zone-tile-lbl { font-size: 9px; color: var(--ink-mute); }
  .zone-tile-sep { width: 100%; height: 1px; background: var(--line); margin: 0; }

  /* Zone popup */
  .zone-popup-backdrop { position: fixed; inset: 0; background: rgba(29,27,24,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .zone-popup { background: var(--surface); border-radius: var(--radius-lg); max-width: 400px; width: 100%; box-shadow: var(--shadow-lg); overflow: hidden; max-height: 85dvh; overflow-y: auto; }
  .zone-popup.has-camera { max-width: 720px; }
  .zone-popup-body { display: flex; gap: 0; }
  .zone-popup-controls { flex: 1; min-width: 0; }
  .zone-popup-camera-col { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 16px 20px; border-left: 1px solid var(--line); gap: 8px; }
  .zone-popup-head { padding: 18px 20px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .zone-popup-title { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 22px; letter-spacing: -0.02em; line-height: 1; }
  .zone-popup-section { padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .zone-popup-section:last-child { border-bottom: none; }
  .zone-popup-section-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-mute); font-weight: 600; margin-bottom: 12px; }
  .zpop-device { padding: 4px 0 8px; }
  .zpop-device + .zpop-device { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 4px; }
  .zpop-device-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .zpop-device-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zpop-temp-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 12px; color: var(--ink-mute); }
  .zpop-target { font-family: var(--font-display); font-style: italic; font-size: 18px; letter-spacing: -0.02em; color: var(--terracotta); }

  /* ====== STYRING (3-col floors) ====== */
  .columns { display: flex; flex-direction: row; padding-top: 8px; flex: 1; min-height: 0; overflow: hidden; }
  .col { flex: 1; min-width: 0; padding: 0 14px 16px; border-left: 1px solid var(--line); height: 100%; overflow-y: auto; }
  .col:first-child { padding-left: 0; border-left: none; }
  .col-head { padding-bottom: 12px; margin-bottom: 14px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .col-title { font-family: var(--font-display); font-weight: 400; font-size: 22px; letter-spacing: -0.02em; line-height: 1; font-variation-settings: 'opsz' 144; }
  .col-title em { font-style: italic; font-weight: 300; color: var(--terracotta); margin-right: 4px; }
  .col-subtitle { font-size: 11px; color: var(--ink-mute); font-weight: 500; white-space: nowrap; }
  .col-tabs { display: flex; gap: 0; margin-bottom: 10px; border-bottom: 1px solid var(--line); }
  .col-tab { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 5px 12px; font-family: var(--font-body); font-size: 10px; font-weight: 500; color: var(--ink-mute); cursor: pointer; margin-bottom: -1px; transition: color .15s; }
  .col-tab.active { color: var(--ink); border-bottom-color: var(--terracotta); }

  /* ZONES & GRID */
  .zone { margin-bottom: 12px; }
  .zone:last-child { margin-bottom: 4px; }
  .device-group { margin-bottom: 4px; }
  .device-group:last-child { margin-bottom: 0; }
  .device-group-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-mute); padding: 5px 0 3px; font-weight: 600; }
  .zone-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; }
  .zone-name { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 16px; letter-spacing: -0.01em; }
  .zone-summary { font-size: 10px; color: var(--ink-mute); flex: 1; border-left: 1px solid var(--line); padding-left: 10px; font-style: italic; }
  .zone-summary span { color: var(--moss); font-style: normal; font-weight: 500; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .grid-wide { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }

  /* CARDS */
  .card { background: var(--surface-soft); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: background .2s; position: relative; }
  .card.toggling { opacity: 0.6; pointer-events: none; }
  .card.off { opacity: 0.55; }
  .card.expanded { background: var(--surface-deep); }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
  .card-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-mute); font-weight: 600; }
  .card-name { font-family: var(--font-body); font-weight: 600; font-size: 12px; line-height: 1.2; letter-spacing: 0; color: var(--ink); margin-top: 1px; }
  .card-state { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 8px; border-radius: var(--radius-xl); font-weight: 600; flex-shrink: 0; line-height: 1.2; }
  .state-on { background: rgba(82, 117, 88, 0.15); color: var(--moss); }
  .state-off { background: rgba(29, 27, 24, 0.06); color: var(--ink-mute); }
  .state-active { background: rgba(210, 137, 104, 0.15); color: var(--terracotta); }
  .state-alert { background: rgba(194, 90, 74, 0.15); color: var(--red); }

  .reading { display: flex; align-items: baseline; gap: 3px; line-height: 0.9; }
  .reading-value { font-family: var(--font-display); font-weight: 400; font-size: 20px; letter-spacing: -0.025em; }
  .reading-value em { font-style: italic; color: var(--terracotta); font-weight: 400; }

  .metrics-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .mini-metric { display: flex; flex-direction: column; gap: 1px; }
  .mini-value { font-family: var(--font-display); font-weight: 400; font-size: 15px; letter-spacing: -0.02em; line-height: 1; }
  .mini-value em { font-style: italic; color: var(--moss); }
  .mini-value.ok { color: var(--moss); font-style: italic; }
  .mini-value.alert { color: var(--red); font-style: italic; }
  .mini-value.warn { color: var(--terracotta); font-style: italic; }
  .mini-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-mute); font-weight: 500; }

  .control { padding-top: 1px; cursor: default; }
  .slider { -webkit-appearance: none; appearance: none; width: 100%; height: 22px; background: transparent; cursor: pointer; }
  .slider::-webkit-slider-runnable-track { height: 4px; background: var(--surface-deep); border-radius: 2px; }
  .slider::-moz-range-track { height: 4px; background: var(--surface-deep); border-radius: 2px; }
  .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: var(--surface); border-radius: 50%; margin-top: -7px; box-shadow: 0 2px 6px rgba(29, 27, 24, 0.15), 0 0 0 0.5px rgba(29, 27, 24, 0.04); transition: transform .15s; }
  .slider::-moz-range-thumb { width: 18px; height: 18px; background: var(--surface); border-radius: 50%; border: none; box-shadow: 0 2px 6px rgba(29, 27, 24, 0.15); }
  .slider-temp::-webkit-slider-thumb { background: var(--terracotta); }
  .slider-temp::-moz-range-thumb { background: var(--terracotta); }
  .slider-dim::-webkit-slider-thumb { background: var(--gold); }
  .slider-dim::-moz-range-thumb { background: var(--gold); }
  .slider-marks { display: flex; justify-content: space-between; font-size: 7px; color: var(--ink-mute); letter-spacing: 0.12em; margin-top: 1px; text-transform: uppercase; }

  .toggle { align-self: flex-start; border: none; background: var(--surface-soft); color: var(--ink-soft); padding: 5px 12px; font-family: var(--font-body); font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; border-radius: var(--radius-xl); transition: all .2s; }
  .toggle.is-on { background: rgba(82, 117, 88, 0.15); color: var(--moss); }

  .featured .card-name::first-letter { font-family: var(--font-display); font-style: italic; color: var(--terracotta); font-weight: 300; }

  .settings { background: var(--surface-soft); border-radius: var(--radius-sm); border-left: 3px solid var(--terracotta); padding: 10px; margin-top: 6px; cursor: default; animation: slideDown .15s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* ====== STYRING TILPASS ====== */
  .styring-toolbar { display: flex; align-items: center; justify-content: flex-end; padding: 5px 0 3px; flex-shrink: 0; }
  .tilpass-btn { background: var(--surface); border: none; border-radius: var(--radius-xl); color: var(--ink-soft); padding: 6px 14px; font-family: var(--font-body); font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; box-shadow: var(--shadow-sm); transition: all .2s; }
  .tilpass-btn.active { background: var(--ink); color: var(--surface); }
  .config-overlay { position: fixed; inset: 0; background: rgba(29,27,24,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-start; justify-content: flex-end; }
  .config-panel { width: min(420px, 95vw); height: 100dvh; background: var(--surface); overflow-y: auto; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; }
  .config-head { padding: 20px 22px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .config-title { font-family: var(--font-display); font-weight: 400; font-size: 20px; letter-spacing: -0.02em; }
  .config-title em { font-style: italic; color: var(--terracotta); }
  .config-close { background: var(--surface-soft); border: none; border-radius: var(--radius-xl); color: var(--ink-soft); padding: 6px 14px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all .2s; }
  .config-body { padding: 16px 22px; flex: 1; }
  .config-floor { margin-bottom: 24px; }
  .config-floor-title { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 15px; letter-spacing: -0.01em; margin-bottom: 8px; color: var(--terracotta); border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .config-zone-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-mute); margin: 10px 0 5px; font-weight: 600; }
  .config-device { display: flex; flex-direction: column; background: var(--surface-soft); border-radius: 8px; padding: 6px 10px; margin-bottom: 4px; transition: background .15s; }
  .config-device-row { display: flex; align-items: center; gap: 8px; }
  .config-device-check { width: 13px; height: 13px; accent-color: var(--moss); cursor: pointer; flex-shrink: 0; }
  .config-device-info { flex: 1; }
  .config-device-name { font-size: 12px; font-family: var(--font-display); line-height: 1.2; }
  .config-device-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-mute); font-weight: 600; }
  .config-metrics-toggle { background: none; border: none; color: var(--ink-mute); font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; padding: 2px 0; flex-shrink: 0; }
  .config-caps { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--line); }
  .config-cap-label { display: flex; align-items: center; gap: 3px; font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; padding: 3px 8px; background: var(--surface); border: none; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); transition: all .15s; user-select: none; }
  .config-cap-label input { accent-color: var(--moss); width: 10px; height: 10px; cursor: pointer; }
  .config-cap-label.active { background: rgba(82,117,88,0.12); color: var(--moss); }
  .config-hint { font-size: 10px; color: var(--ink-mute); text-align: center; padding: 16px 0 8px; font-style: italic; }
  .config-tabs { display: flex; border-bottom: 1px solid var(--line); padding: 0 22px; flex-shrink: 0; }
  .config-tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; padding: 8px 14px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-mute); cursor: pointer; margin-bottom: -1px; transition: color .2s; }
  .config-tab-btn.active { color: var(--ink); border-bottom-color: var(--terracotta); }

  /* ====== SIKKERHET ====== */
  .security-status {
    padding: 18px 22px;
    margin: 14px 0;
    border-left: 3px solid var(--moss);
    background: rgba(82, 117, 88, 0.06);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .security-status.alert { border-left-color: var(--red); background: rgba(194, 90, 74, 0.06); }
  .security-status-icon {
    font-family: var(--font-display); font-style: italic;
    font-size: 36px; color: var(--moss); line-height: 1;
  }
  .security-status.alert .security-status-icon { color: var(--red); }
  .security-status-text { flex: 1; }
  .security-status-headline { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 22px; line-height: 1.1; }
  .security-status-headline em { font-weight: 300; color: var(--moss); }
  .security-status.alert .security-status-headline em { color: var(--red); }
  .security-status-detail { font-size: 11px; color: var(--ink-soft); margin-top: 4px; font-style: italic; }

  .sec-section { margin-bottom: 22px; }
  .sec-section-head {
    display: flex; align-items: baseline;
    justify-content: space-between; gap: 12px;
    padding-bottom: 8px; margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .sec-section-title {
    font-family: var(--font-display); font-weight: 400; font-style: italic;
    font-size: 18px; letter-spacing: -0.01em;
  }
  .sec-section-title em { font-weight: 300; color: var(--terracotta); margin-right: 4px; }
  .sec-section-count { font-size: 11px; color: var(--ink-mute); font-weight: 500; }

  .event-log { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
  .event-row {
    background: var(--surface-soft);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 12px;
    font-size: 12px;
  }
  .event-row.alert { background: rgba(194, 90, 74, 0.06); }
  .event-time { font-family: var(--font-display); font-style: italic; font-size: 12px; color: var(--ink-mute); flex-shrink: 0; min-width: 48px; }
  .event-icon { font-size: 14px; flex-shrink: 0; }
  .event-text { flex: 1; line-height: 1.3; }
  .event-text strong { font-weight: 600; }
  .event-zone { font-size: 9px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.12em; flex-shrink: 0; font-weight: 500; }

  .empty { color: var(--ink-mute); padding: 24px; text-align: center; font-size: 12px; font-style: italic; }
  /* Spotify overlay */
  .spotify-backdrop { position: fixed; inset: 0; background: rgba(29,27,24,0.6); backdrop-filter: blur(8px); z-index: 250; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .spotify-panel { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 400px; max-height: 84vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-lg); }
  .spotify-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 14px; flex-shrink: 0; border-bottom: 1px solid var(--line); }
  .spotify-title { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-style: italic; font-size: 20px; letter-spacing: -0.02em; line-height: 1; }
  .spotify-title svg { width: 20px; height: 20px; fill: #1DB954; flex-shrink: 0; }
  .spotify-body { flex: 1; overflow-y: auto; padding: 14px 18px 18px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .spotify-search { width: 100%; padding: 9px 12px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; background: var(--surface-soft); color: var(--ink); outline: none; transition: border-color .2s; }
  .spotify-search:focus { border-color: #1DB954; }
  .spotify-section { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-mute); font-weight: 600; margin-top: 4px; }
  .spotify-list { display: flex; flex-direction: column; gap: 2px; }
  .spotify-item { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border: none; background: transparent; border-radius: var(--radius-sm); cursor: pointer; text-align: left; transition: background .15s; width: 100%; }
  .spotify-item:hover:not(:disabled) { background: var(--surface-soft); }
  .spotify-item:disabled { opacity: 0.5; cursor: default; }
  .spotify-item-img { width: 38px; height: 38px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--surface-deep); }
  .spotify-item-placeholder { width: 38px; height: 38px; border-radius: 4px; background: var(--surface-deep); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .spotify-item-info { flex: 1; min-width: 0; text-align: left; }
  .spotify-item-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
  .spotify-item-meta { font-size: 10px; color: var(--ink-mute); margin-top: 1px; }
  .spotify-item-play { font-size: 11px; color: var(--ink-mute); flex-shrink: 0; }
  .spotify-item.active .spotify-item-play { color: #1DB954; }
  .spotify-item.active { background: rgba(29,185,84,0.07); }
  .spotify-now { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: rgba(29,185,84,0.09); border-radius: var(--radius-sm); font-size: 11px; color: var(--ink-soft); flex-shrink: 0; }
  .spotify-now-dot { width: 6px; height: 6px; border-radius: 50%; background: #1DB954; flex-shrink: 0; animation: pulse 2s infinite; }
  .spotify-now-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spotify-pause-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px 4px; color: var(--ink-soft); flex-shrink: 0; line-height: 1; transition: color .15s; }
  .spotify-pause-btn:hover { color: #1DB954; }
  .spotify-pause-btn:disabled { opacity: 0.4; cursor: default; }
  .spotify-device-bar { display: flex; align-items: center; gap: 8px; padding: 10px 0 0; border-top: 1px solid var(--line); flex-shrink: 0; margin-top: 4px; }
  .spotify-device-lbl { font-size: 10px; color: var(--ink-mute); flex-shrink: 0; }
  .spotify-device-select { flex: 1; min-width: 0; border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 5px 7px; font-family: var(--font-body); font-size: 12px; background: var(--surface-soft); color: var(--ink); outline: none; cursor: pointer; }
  .spotify-connect-screen { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 40px 24px 32px; text-align: center; }
  .spotify-connect-screen p { font-size: 13px; color: var(--ink-soft); line-height: 1.65; max-width: 260px; }
  .spotify-connect-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 24px; background: #1DB954; color: #fff; border: none; border-radius: 50px; font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background .2s, transform .15s; }
  .spotify-connect-btn:hover { background: #1ed760; transform: scale(1.02); color: #fff; }
  .sonos-station-spotify svg { width: 22px; height: 22px; fill: #1DB954; }

  /* Zaptec module */

  .zaptec-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }

  /* Audi module */

  .audi-pct em { color: var(--moss); font-style: normal; }
  .audi-meta { display: flex; flex-direction: column; gap: 2px; padding-bottom: 4px; }
  .audi-range { font-size: 12px; font-weight: 500; color: var(--ink-soft); }
  .audi-charging { font-size: 11px; color: var(--moss); }
  .audi-plug { font-size: 11px; color: var(--ink-mute); }
  .audi-bar-wrap { margin-top: 8px; height: 6px; background: var(--surface-deep); border-radius: 99px; overflow: hidden; }
  .audi-bar { height: 100%; border-radius: 99px; transition: width .6s ease; }
  .audi-divider { border: none; border-top: 1px solid var(--line); margin: 10px 0; }
  .audi-climate-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .audi-climate-label { font-size: 12px; color: var(--ink-soft); }
  .audi-climate-state { font-size: 11px; color: var(--terracotta); font-weight: 500; }
  .audi-temp-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .audi-temp-btn { flex: 1; padding: 10px 8px; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; }
  .audi-temp-btn.start { background: var(--terracotta); color: #fff; }
  .audi-temp-btn.stop  { background: var(--surface-soft); color: var(--ink); }
  .audi-temp-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .audi-temp-input { width: 52px; padding: 9px 6px; border: 1.5px solid var(--line); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; text-align: center; background: var(--surface-soft); color: var(--ink); outline: none; }

  .colophon { display: none; }
  .colophon em { font-family: var(--font-display); font-style: italic; font-weight: 300; text-transform: none; letter-spacing: 0; font-size: 11px; color: var(--ink-soft); }

  .flow-list { display: flex; flex-direction: column; gap: 8px; max-width: 700px; padding-top: 14px; }
  .flow-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface-soft); border: none; border-radius: var(--radius-sm); gap: 12px; }
  .flow-row .flow-name { font-family: var(--font-display); font-style: italic; font-size: 15px; flex: 1; }
  .run-btn { background: var(--ink); color: var(--surface); border: none; padding: 7px 16px; font-family: var(--font-body); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; border-radius: var(--radius-xl); transition: all .2s; }
  .run-btn:disabled { background: var(--ink-mute); }
  .run-btn.done { background: var(--moss); }

  .single-view { padding-top: 14px; flex: 1; min-height: 0; overflow-y: auto; }
  .tab-content { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }

  @media (max-width: 1100px) {
    .home-grid { grid-template-columns: repeat(2, 1fr); }
    .module.span-3 { grid-column: span 2; }
  }
  @media (max-width: 700px) {
    .home-grid { grid-template-columns: 1fr; }
    .module.span-2, .module.span-3 { grid-column: span 1; }
    .home-masonry-row { flex-direction: column; }
    .columns { grid-template-columns: 1fr !important; }
    .col { padding: 0; border-left: none; border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; }

</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

async function api(path, opts = {}) {
  const r = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}

const ROMAN = ["", "i", "ii", "iii", "iv", "v", "vi", "vii", "viii", "ix", "x"];

const METRIC_DEFS = {
  measure_temperature: { label: "Temp", suffix: "°", fmt: v => Number(v).toFixed(1) },
  measure_humidity: { label: "Fukt", suffix: "%", fmt: v => Math.round(Number(v)) },
  measure_co2: { label: "CO₂", suffix: "", fmt: v => Math.round(Number(v)), warn: v => v > 1000, alert: v => v > 1500 },
  measure_co: { label: "CO", suffix: " ppm", fmt: v => Math.round(Number(v)) },
  measure_pm25: { label: "PM2.5", suffix: " µg", fmt: v => Math.round(Number(v)) },
  measure_power: { label: "Effekt", suffix: "W", fmt: v => Number(v).toFixed(0) },
  measure_voltage: { label: "Volt", suffix: "V", fmt: v => Number(v).toFixed(1) },
  measure_current: { label: "Strøm", suffix: "A", fmt: v => Number(v).toFixed(2) },
  measure_battery: { label: "Batteri", suffix: "%", fmt: v => Math.round(Number(v)), warn: v => v < 20, alert: v => v < 10 },
  measure_luminance: { label: "Lux", suffix: "", fmt: v => Math.round(Number(v)) },
  measure_pressure: { label: "Trykk", suffix: " hPa", fmt: v => Math.round(Number(v)) },
  measure_rain: { label: "Regn", suffix: " mm", fmt: v => Number(v).toFixed(1) },
  measure_wind_strength: { label: "Vind", suffix: " m/s", fmt: v => Number(v).toFixed(1) },
  measure_noise: { label: "Støy", suffix: " dB", fmt: v => Math.round(Number(v)) },
  meter_power: { label: "Forbruk", suffix: " kWh", fmt: v => Number(v).toFixed(2) },
  meter_water: { label: "Vann", suffix: " m³", fmt: v => Number(v).toFixed(2) },
  alarm_motion: { label: "Bevegelse", fmt: v => v ? "Aktiv" : "Rolig", state: v => v ? "warn" : "ok" },
  alarm_contact: { label: "Kontakt", fmt: v => v ? "Åpen" : "Lukket", state: v => v ? "alert" : "ok" },
  alarm_smoke: { label: "Røyk", fmt: v => v ? "Røyk!" : "OK", state: v => v ? "alert" : "ok" },
  alarm_water: { label: "Lekkasje", fmt: v => v ? "Vann!" : "OK", state: v => v ? "alert" : "ok" },
  alarm_co: { label: "CO-alarm", fmt: v => v ? "CO!" : "OK", state: v => v ? "alert" : "ok" },
  alarm_tamper: { label: "Tukling", fmt: v => v ? "Ja" : "Nei", state: v => v ? "alert" : "ok" },
};

function deviceLabel(device, vals) {
  if (device.class === "light") return "Lys";
  if (device.class === "thermostat") return "Termostat";
  if (device.class === "socket") return "Kontakt";
  if (device.class === "lock") return "Lås";
  if (device.class === "speaker") return "Høyttaler";
  if (device.class === "blinds" || device.class === "curtain") return "Persienne";
  if (vals.alarm_motion != null) return "Bevegelse";
  if (vals.alarm_contact != null) return "Vindu/dør";
  if (vals.alarm_smoke != null) return "Røyk";
  if (vals.alarm_water != null) return "Lekkasje";
  if (device.class === "sensor") return "Sensor";
  if (vals.measure_power != null && !vals.onoff) return "Strømmåler";
  return "Enhet";
}

function buildZoneTree(zones) {
  const list = Object.values(zones);
  const byParent = {};
  list.forEach(z => {
    const p = z.parent || "_root";
    (byParent[p] = byParent[p] || []).push(z);
  });
  const sortFn = (a, b) => (a.order ?? a.index ?? 0) - (b.order ?? b.index ?? 0) || a.name.localeCompare(b.name, "no");
  const attach = (zone) => ({
    ...zone,
    children: (byParent[zone.id] || []).sort(sortFn).map(attach),
  });
  const ids = new Set(list.map(z => z.id));
  const roots = list.filter(z => !z.parent || !ids.has(z.parent));
  return roots.sort(sortFn).map(attach);
}

function devicesInZoneTree(zone, devicesByZone) {
  const own = devicesByZone[zone.id] || [];
  const fromChildren = (zone.children || []).flatMap(c => devicesInZoneTree(c, devicesByZone));
  return [...own, ...fromChildren];
}

function findHanMeter(devices, configuredId) {
  if (configuredId) {
    const found = devices.find(d => d.id === configuredId);
    if (found) return found;
  }
  const nameMatches = devices.filter(d => {
    const n = (d.name || "").toLowerCase();
    return (n.includes("han") || n.includes("tibber") || n.includes("hovedmål") || n.includes("strømmåler") ||
            (n.includes("shelly") && (n.includes("em") || n.includes("3em"))) ||
            n.includes("pulse") || n.includes("p1")) &&
           d.capabilitiesObj?.measure_power != null;
  });
  if (nameMatches.length > 0) return nameMatches[0];
  const withPower = devices.filter(d => d.capabilitiesObj?.measure_power?.value != null);
  if (withPower.length === 0) return null;
  return withPower.sort((a, b) => (b.capabilitiesObj.measure_power.value || 0) - (a.capabilitiesObj.measure_power.value || 0))[0];
}

function findOutdoorSensor(devices, zones, configuredId) {
  if (configuredId) {
    const found = devices.find(d => d.id === configuredId);
    if (found) return found;
  }
  const outdoorWords = ["ute", "uteplass", "balkong", "garden", "hage", "værstasjon", "veranda", "outdoor"];
  return devices.find(d => {
    if (d.capabilitiesObj?.measure_temperature?.value == null) return false;
    const n = (d.name || "").toLowerCase();
    const zoneName = (zones[d.zone]?.name || "").toLowerCase();
    return outdoorWords.some(w => n.includes(w) || zoneName.includes(w));
  });
}

function formatDecimal(num, decimals = 1) {
  const n = Number(num);
  const fixed = n.toFixed(decimals);
  const [intPart, decPart] = fixed.split(".");
  return { intPart, decPart };
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return `${sec}s`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}t`;
  return `${Math.floor(hr / 24)}d`;
}

// ==================== SETUP ====================
function SetupScreen({ error }) {
  return (
    <div className="setup">
      <div className="setup-card">
        <div className="setup-mark">Hjem<em>et</em></div>
        <div className="setup-tag">Et levende dashbord · sky-tilkobling</div>
        <p className="setup-text">Du er i ferd med å logge inn på Homey-kontoen din via Athoms <em>offisielle skytjeneste</em>. Etter pålogging henter dashbordet enhetene dine, sensorene og hjemmets stille rytmer.</p>
        <button className="login-btn" onClick={() => window.location.href = "/auth/login"}>
          Logg inn med Homey
        </button>
        {error && <div className="error-box">{error}</div>}
      </div>
    </div>
  );
}

// ==================== DEVICE CARD ====================
function DeviceCard({ device, onToggle, onSetCapability, prefs, onUpdatePrefs, compact }) {
  const cap = device.capabilities || [];
  const vals = device.capabilitiesObj || {};
  const isOn = vals.onoff?.value;
  const hasOnoff = cap.includes("onoff");
  const hasDim = cap.includes("dim");
  const hasTargetTemp = cap.includes("target_temperature");

  const allMetricCaps = cap.filter(c => METRIC_DEFS[c]);
  const devicePrefs = prefs[device.id] || {};
  const visibleMetrics = devicePrefs.metrics || allMetricCaps;

  const [toggling, setToggling] = useState(false);
  const [localDim, setLocalDim] = useState(vals.dim?.value ?? 0);
  const [localTargetTemp, setLocalTargetTemp] = useState(vals.target_temperature?.value ?? 20);
  const lastInteract = useRef(0);

  useEffect(() => {
    if (Date.now() - lastInteract.current > 2500 && vals.dim?.value != null) setLocalDim(vals.dim.value);
  }, [vals.dim?.value]);
  useEffect(() => {
    if (Date.now() - lastInteract.current > 2500 && vals.target_temperature?.value != null) setLocalTargetTemp(vals.target_temperature.value);
  }, [vals.target_temperature?.value]);

  const handleToggle = async (e) => {
    e.stopPropagation();
    setToggling(true);
    await onToggle(device.id, !isOn);
    setToggling(false);
  };
  const handleDimChange = (e) => { lastInteract.current = Date.now(); setLocalDim(parseFloat(e.target.value)); };
  const handleDimRelease = () => onSetCapability(device.id, "dim", localDim);
  const handleTempChange = (e) => { lastInteract.current = Date.now(); setLocalTargetTemp(parseFloat(e.target.value)); };
  const handleTempRelease = () => onSetCapability(device.id, "target_temperature", localTargetTemp);

  const tempCap = vals.target_temperature?.options || {};
  const tempMin = tempCap.min ?? 5;
  const tempMax = tempCap.max ?? 30;
  const tempStep = tempCap.step ?? 0.5;
  const stopProp = (e) => e.stopPropagation();
  const label = deviceLabel(device, vals);
  const isFeatured = hasDim && isOn;

  let stateBadge = null;
  if (hasOnoff) {
    stateBadge = <span className={`card-state ${isOn ? "state-on" : "state-off"}`}>{isOn ? "På" : "Av"}</span>;
  } else if (vals.alarm_motion?.value) {
    stateBadge = <span className="card-state state-active">Aktiv</span>;
  } else if (vals.alarm_contact != null) {
    stateBadge = <span className={`card-state ${vals.alarm_contact.value ? "state-alert" : "state-off"}`}>{vals.alarm_contact.value ? "Åpen" : "Lukket"}</span>;
  } else if (vals.alarm_smoke?.value || vals.alarm_water?.value || vals.alarm_co?.value) {
    stateBadge = <span className="card-state state-alert">Alarm!</span>;
  } else if (vals.measure_power?.value > 0) {
    stateBadge = <span className="card-state state-active">Live</span>;
  }

  return (
    <article
      className={`card ${isOn === false ? "off" : ""} ${toggling ? "toggling" : ""} ${isFeatured ? "featured" : ""}`}
      onClick={hasOnoff ? handleToggle : undefined}
    >
      <div className="card-head">
        <div>
          <div className="card-label">{label}</div>
          <div className="card-name">{device.name}</div>
        </div>
        {stateBadge}
      </div>

      {hasTargetTemp && (
        <>
          <div className="metrics-row">
            {vals.measure_temperature?.value != null && (
              <div className="mini-metric"><div className="mini-value">{Number(vals.measure_temperature.value).toFixed(1)}°</div><div className="mini-label">Nå</div></div>
            )}
            <div className="mini-metric"><div className="mini-value"><em>{Number(localTargetTemp).toFixed(1)}°</em></div><div className="mini-label">Ønsket</div></div>
          </div>
          <div className="control" onClick={stopProp}>
            <input type="range" min={tempMin} max={tempMax} step={tempStep} value={localTargetTemp}
              onChange={handleTempChange} onMouseUp={handleTempRelease} onTouchEnd={handleTempRelease} onKeyUp={handleTempRelease} className="slider" />
            <div className="slider-marks"><span>{tempMin}°</span><span>{tempMax}°</span></div>
          </div>
        </>
      )}

      {hasDim && !hasTargetTemp && (
        <>
          <div className="control" onClick={stopProp}>
            <input type="range" min={0} max={1} step={0.01} value={localDim}
              onChange={handleDimChange} onMouseUp={handleDimRelease} onTouchEnd={handleDimRelease} onKeyUp={handleDimRelease} className="slider slider-dim" />
            <div className="slider-marks"><span>av</span><span>full</span></div>
          </div>
        </>
      )}

      {!hasTargetTemp && (
        <div className="metrics-row">
          {visibleMetrics.map(capName => {
            const def = METRIC_DEFS[capName];
            const v = vals[capName]?.value;
            if (!def || v == null || capName === "dim") return null;
            const stateClass = def.state ? def.state(v) : (def.alert?.(v) ? "alert" : def.warn?.(v) ? "warn" : "");
            return (
              <div key={capName} className="mini-metric">
                <div className={`mini-value ${stateClass}`}>{def.fmt(v)}{def.suffix || ""}</div>
                <div className="mini-label">{def.label}</div>
              </div>
            );
          })}
        </div>
      )}

    </article>
  );
}

// ==================== ZONE BLOCK & FLOOR COLUMN ====================
const DEVICE_GROUPS = [
  { key: "lys",       label: "Lys",        test: d => d.class === "light" || (d.class !== "socket" && (d.capabilities||[]).includes("dim")) },
  { key: "termostat", label: "Termostater", test: d => d.class === "thermostat" || (d.capabilities||[]).includes("target_temperature") },
  { key: "kontakt",   label: "Kontakter",   test: d => d.class === "socket" },
  { key: "las",       label: "Lås",         test: d => d.class === "lock" },
  { key: "persienne", label: "Persienner",  test: d => d.class === "blinds" || d.class === "curtain" },
  { key: "hoytt",     label: "Høyttalere",  test: d => d.class === "speaker" },
  { key: "sensor",    label: "Sensorer",    test: d => d.class === "sensor" },
  { key: "strom",     label: "Strøm",       test: d => { const v = d.capabilitiesObj||{}; return (v.measure_power != null || v.meter_power != null) && v.onoff == null; } },
  { key: "sikkerhet", label: "Sikkerhet",   test: d => { const v = d.capabilitiesObj||{}; return v.alarm_motion != null || v.alarm_contact != null || v.alarm_smoke != null || v.alarm_water != null || v.alarm_co != null; } },
];

function groupDevices(devices) {
  const assigned = new Set();
  const groups = [];
  for (const grp of DEVICE_GROUPS) {
    const matched = devices.filter(d => !assigned.has(d.id) && grp.test(d));
    if (matched.length > 0) {
      matched.forEach(d => assigned.add(d.id));
      groups.push({ ...grp, devices: matched });
    }
  }
  const remaining = devices.filter(d => !assigned.has(d.id));
  if (remaining.length > 0) groups.push({ key: "annet", label: "Annet", devices: remaining });
  return groups;
}

function DeviceGroups({ devices, onToggle, onSetCapability, prefs, onUpdatePrefs }) {
  const groups = groupDevices(devices);
  const multiGroup = groups.length > 1;
  return (
    <>
      {groups.map(grp => (
        <div key={grp.key} className="device-group">
          {multiGroup && <div className="device-group-label">{grp.label}</div>}
          <div className="grid">
            {grp.devices.map(d => (

function ZoneBlock({ zone, devicesByZone, onToggle, onSetCapability, prefs, onUpdatePrefs }) {
  const allDevices = devicesInZoneTree(zone, devicesByZone);
  if (allDevices.length === 0) return null;
  const lights = allDevices.filter(d => (d.capabilities || []).includes("onoff") && (d.class === "light" || (d.capabilities || []).includes("dim")));
  const lightsOn = lights.filter(d => d.capabilitiesObj?.onoff?.value).length;
  const temps = allDevices.filter(d => d.capabilitiesObj?.measure_temperature?.value != null);
  const avgTemp = temps.length ? (temps.reduce((s, d) => s + Number(d.capabilitiesObj.measure_temperature.value), 0) / temps.length).toFixed(1) : null;

  return (
    <div className="zone">
      <div className="zone-header">
        <h3 className="zone-name">{zone.name}</h3>
        {(lights.length > 0 || avgTemp) && (
          <div className="zone-summary">
            {lights.length > 0 && <><span>{lightsOn}/{lights.length}</span> lys</>}
            {lights.length > 0 && avgTemp && " · "}
            {avgTemp && <span>{avgTemp}°</span>}
          </div>
        )}
      </div>
      <DeviceGroups devices={allDevices} onToggle={onToggle} onSetCapability={onSetCapability} prefs={prefs} onUpdatePrefs={onUpdatePrefs} />
    </div>
  );
}

function FloorColumn({ floor, idx, devicesByZone, onToggle, onSetCapability, prefs, onUpdatePrefs }) {
  const allDevices = devicesInZoneTree(floor, devicesByZone);
  if (allDevices.length === 0) return null;
  const num = ROMAN[idx + 1] || (idx + 1);

  const assigned = new Set();
  const lys = allDevices.filter(d => DEVICE_GROUPS[0].test(d));
  lys.forEach(d => assigned.add(d.id));
  const termostater = allDevices.filter(d => !assigned.has(d.id) && DEVICE_GROUPS[1].test(d));
  termostater.forEach(d => assigned.add(d.id));
  const annet = allDevices.filter(d => !assigned.has(d.id));

  const tabs = [
    { key: "lys",  label: "Lys",  devices: lys },
    { key: "temp", label: "Temp", devices: termostater },
    { key: "annet",label: "Annet",devices: annet },
  ].filter(t => t.devices.length > 0);

  const [activeTab, setActiveTab] = useState(tabs[0]?.key || "lys");
  const activeDevices = tabs.find(t => t.key === activeTab)?.devices || tabs[0]?.devices || [];

  return (
    <div className="col">
      <div className="col-head">
        <h2 className="col-title"><em>{num}.</em>{floor.name}</h2>
        <div className="col-subtitle">{allDevices.length} enheter</div>
      </div>
      {tabs.length > 1 && (
        <div className="col-tabs">
          {tabs.map(t => (
            <button key={t.key} className={`col-tab ${activeTab === t.key ? "active" : ""}`} onClick={() => setActiveTab(t.key)}>
              {t.label}
            </button>
          ))}
        </div>
      )}
      <div className="grid">
        {activeDevices.map(d => (
          <DeviceCard key={d.id} device={d} onToggle={onToggle} onSetCapability={onSetCapability} prefs={prefs} onUpdatePrefs={onUpdatePrefs} />
        ))}
      </div>
    </div>
  );
}

const ZAPTEC_MODES = {
  1: { label: "Ledig",           icon: "🔌", color: "var(--ink-mute)" },
  2: { label: "Klar til lading", icon: "⚡", color: "var(--gold)" },
  3: { label: "Lader",           icon: "🔋", color: "var(--moss)" },
  5: { label: "Pauset",          icon: "⏸",  color: "var(--ink-mute)" },
};

function ZaptecModule() {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const load = useCallback(async () => {
    try {
      const data = await fetch("/zaptec/status").then(r => r.json());
      if (data.error) { setError(data.error); setStatus(null); }
      else { setStatus(data); setError(""); }
    } catch { setError("Kunne ikke nå Zaptec"); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); const t = setInterval(load, 15000); return () => clearInterval(t); }, [load]);

  const authorize = async () => {
    setBusy(true);
    try {
      await fetch("/zaptec/authorize", { method: "POST" });
      setTimeout(load, 2000);
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  const stop = async () => {
    setBusy(true);
    try {
      await fetch("/zaptec/stop", { method: "POST" });
      setTimeout(load, 2000);
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  const mode = status ? (ZAPTEC_MODES[status.mode] || { label: `Modus ${status.mode}`, icon: "❓", color: "var(--ink-mute)" }) : null;
  const powerKw = status ? status.powerW / 1000 : 0;

  return (
    <>
      <div className="module-head">
        <div className="module-title">El-bil<em>lader</em></div>
        {status && <span className="module-sub">{status.name}</span>}
      </div>

      {loading && <div className="empty">Kobler til…</div>}
      {error && <div className="empty" style={{ color: "var(--red)" }}>{error}</div>}

      {status && mode && (
        <>
          <div className="zaptec-status">
            <div className="zaptec-icon">{mode.icon}</div>
            <div className="zaptec-info">
              <div className="zaptec-mode" style={{ color: mode.color }}>{mode.label}</div>
              {status.mode === 3 && powerKw > 0.1 && (
                <div className="zaptec-power">{powerKw.toFixed(1)} kW</div>
              )}
              {status.sessionEnergy > 0 && (
                <div className="zaptec-energy">{status.sessionEnergy.toFixed(2)} kWh denne sesjonen</div>
              )}
            </div>
          </div>

          {status.mode === 2 && (
            <button className="zaptec-action authorize" onClick={authorize} disabled={busy}>
              {busy ? "Autoriserer…" : "⚡ Autoriser lading"}
            </button>
          )}
          {status.mode === 3 && (
            <button className="zaptec-action stop" onClick={stop} disabled={busy}>
              {busy ? "Stopper…" : "⏹ Stopp lading"}
            </button>
          )}
        </>
      )}
    </>
  );
}

function RoboRockModule({ devices, flows, globalPrefs, onSetCapability, onRunFlow }) {
  const device = useMemo(() => {
    if (globalPrefs.roborockDeviceId) return devices.find(d => d.id === globalPrefs.roborockDeviceId);
    return devices.find(d => d.class === "vacuumcleaner" || (d.capabilities || []).includes("vacuumcleaner_state"));
  }, [devices, globalPrefs.roborockDeviceId]);

  const [busy, setBusy] = useState(false);
  const [flowDone, setFlowDone] = useState(false);
  const [localCleaning, setLocalCleaning] = useState(null);

  const deviceCleaning = device?.capabilitiesObj?.is_cleaning?.value;
  useEffect(() => { setLocalCleaning(null); }, [deviceCleaning]);
  const isCleaning = localCleaning !== null ? localCleaning : deviceCleaning;
  const battery = device?.capabilitiesObj?.measure_battery?.value;
  const chargingState = device?.capabilitiesObj?.battery_charging_state?.value;

  const CHARGING_LABELS = { charging: "Lader", charged: "Fulladet", discharging: "På batteri" };
  const stateLabel = isCleaning ? "Vasker" : (CHARGING_LABELS[chargingState] ?? "Klar");
  const icon = isCleaning ? "🤖" : (chargingState === "charging" ? "⚡" : "🏠");

  const routineFlow = flows.find(f => f.id === globalPrefs.roborockFlowId);

  useEffect(() => {
    if (device) console.log("Roborock caps:", device.capabilities, "obj:", device.capabilitiesObj);
  }, [device?.id]);

  const handleClean = async () => {
    if (!device) return;
    setBusy(true);
    try {
      if (isCleaning) {
        setLocalCleaning(false);
        await onSetCapability(device.id, "dock", true);
      } else {
        setLocalCleaning(true);
        await onSetCapability(device.id, "clean_full", true);
      }
    } catch(e) { console.error("Roborock feil:", e); }
    finally { setBusy(false); }
  };

  const handleRoutine = async () => {
    if (!routineFlow) return;
    setBusy(true);
    try {
      await onRunFlow(routineFlow.id);
      setFlowDone(true);
      setTimeout(() => setFlowDone(false), 2000);
    } finally { setBusy(false); }
  };

  return (
    <>
      <div className="module-head">
        <div className="module-title">Støvsuger</div>
        {battery != null && <span className="module-sub">{Math.round(battery)}%</span>}
      </div>
      {!device ? (
        <div className="empty">Ingen støvsuger funnet – velg enhet i innstillinger</div>
      ) : (
        <>
          <div className="robo-status">
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div className="robo-icon">{icon}</div>
              <div className="robo-info">
                <div className="robo-state">{stateLabel}</div>
                {battery != null && (
                  <div className="robo-battery">
                    {battery < 20 ? "🔴" : battery < 50 ? "🟡" : "🟢"} {Math.round(battery)}% batteri
                  </div>
                )}
              </div>
            </div>
            <button
              className={`robo-btn primary ${isCleaning ? "active" : ""}`}
              onClick={handleClean}
              disabled={busy}
              style={{ width: "auto", padding: "7px 12px", flexShrink: 0 }}
            >
              {isCleaning ? "⏹ Til base" : "▶ Full vask"}
            </button>
          </div>
          <div className="robo-actions">
            {routineFlow && (
              <button
                className={`robo-btn secondary ${flowDone ? "active" : ""}`}
                onClick={handleRoutine}
                disabled={busy}
              >
                {flowDone ? "✓ Startet" : `▶ ${routineFlow.name}`}
              </button>
            )}
          </div>
        </>
      )}
    </>
  );
}

const WX_LABELS = {
  clearsky: "Klarvær", fair: "Lettskyet", partlycloudy: "Delvis skyet", cloudy: "Overskyet", fog: "Tåke",
  lightrain: "Lett regn", rain: "Regn", heavyrain: "Kraftig regn",
  lightrainshowers: "Regnbyger", rainshowers: "Regnbyger", heavyrainshowers: "Kraftige regnbyger",
  lightsleet: "Lett sludd", sleet: "Sludd", heavysleet: "Kraftig sludd",
  lightsleetshowers: "Sluddbyger", sleetshowers: "Sluddbyger",
  lightsnow: "Lett snø", snow: "Snø", heavysnow: "Kraftig snø",
  lightsnowshowers: "Snøbyger", snowshowers: "Snøbyger", heavysnowshowers: "Kraftige snøbyger",
};
function wxLabel(code) {
  if (!code) return null;
  const base = code.replace(/_(day|night|polartwilight)$/, "");
  if (WX_LABELS[base]) return WX_LABELS[base];
  if (base.includes("thunder")) return "Torden";
  if (base.includes("snow")) return "Snø";
  if (base.includes("sleet")) return "Sludd";
  if (base.includes("rain")) return "Regn";
  return base;
}
function wxIcon(code) {
  if (!code) return "•";
  const base = code.replace(/_(day|night|polartwilight)$/, "");
  if (base === "clearsky") return "☀️";
  if (base === "fair") return "🌤️";
  if (base.startsWith("partlycloudy")) return "⛅";
  if (base === "cloudy") return "☁️";
  if (base === "fog") return "🌫️";
  if (base.includes("thunder")) return "⛈️";
  if (base.includes("snow")) return "❄️";
  if (base.includes("sleet")) return "🌨️";
  if (base.includes("rain") || base.includes("shower")) return "🌧️";
  return "🌡️";
}

function clothingRec({ minTemp, maxTemp, precip, wind, symbol }) {
  if (minTemp == null && maxTemp == null) return null;
  const temp = minTemp ?? maxTemp;
  const isSnow = symbol && (symbol.includes("snow") || symbol.includes("sleet"));
  const isRain = !isSnow && precip > 1.0;
  const isWindy = wind != null && wind > 10;

  let base;
  if (temp < -15) base = "Skikkelig vinterutstyr";
  else if (temp < -10) base = "Vinterjakke, lue og votter";
  else if (temp < -5) base = "Vinterjakke og lue";
  else if (temp < 0) base = "Vinterjakke";
  else if (temp < 5) base = "Tykk jakke";
  else if (temp < 10) base = "Jakke";
  else if (temp < 15) base = "Lett jakke";
  else if (temp < 20) base = "Genser holder";
  else if (temp < 25) base = "T-skjorte";
  else base = "Shorts og t-skjorte!";

  const extras = [];
  if (isSnow) extras.push("varme støvler");
  else if (isRain) extras.push("regnjakke");
  if (isWindy && temp < 15) extras.push("vindjakke");

  if (extras.length === 0) return base;
  if (extras.length === 1) return `${base} og ${extras[0]}`;
  return `${base}, ${extras[0]} og ${extras[1]}`;
}

function HanWeatherModule({ devices, zones, globalPrefs }) {
  const han = useMemo(() => findHanMeter(devices, globalPrefs.hanMeterId), [devices, globalPrefs.hanMeterId]);
  const sensor = useMemo(() => findOutdoorSensor(devices, zones, globalPrefs.outdoorSensorId), [devices, zones, globalPrefs.outdoorSensorId]);
  const power = han?.capabilitiesObj?.measure_power?.value;
  const kw = power != null ? power / 1000 : null;
  const temp = sensor?.capabilitiesObj?.measure_temperature?.value;

  const [blocks, setBlocks] = useState([]);
  useEffect(() => {
    const load = async () => {
      try {
        const r = await fetch("/weather/forecast");
        if (!r.ok) return;
        const json = await r.json();
        const ts = json.properties?.timeseries;
        if (!ts?.length) return;
        const now = Date.now();
        const upcoming = ts.filter(e => new Date(e.time).getTime() >= now - 3600000);
        const result = [0, 1].map(i => {
          const slice = upcoming.slice(i * 6, i * 6 + 7);
          if (!slice.length) return null;
          const start = new Date(slice[0].time);
          const end = new Date(slice[Math.min(6, slice.length - 1)].time);
          const label = `${String(start.getHours()).padStart(2,'0')}–${String(end.getHours()).padStart(2,'0')}`;
          const temps = slice.map(e => e.data?.instant?.details?.air_temperature).filter(t => t != null);
          const symbol = slice[0]?.data?.next_6_hours?.summary?.symbol_code || slice[0]?.data?.next_1_hours?.summary?.symbol_code;
          const precip = slice[0]?.data?.next_6_hours?.details?.precipitation_amount
            ?? slice.reduce((s, e) => s + (e.data?.next_1_hours?.details?.precipitation_amount ?? 0), 0);
          const wind = slice[0]?.data?.instant?.details?.wind_speed ?? null;
          const rainProb = slice[0]?.data?.next_6_hours?.details?.probability_of_precipitation
            ?? slice[0]?.data?.next_1_hours?.details?.probability_of_precipitation
            ?? null;
          return { label, symbol, min: temps.length ? Math.round(Math.min(...temps)) : null, max: temps.length ? Math.round(Math.max(...temps)) : null, precip, wind, rainProb };
        }).filter(Boolean);
        setBlocks(result);
      } catch (e) { console.error("Forecast:", e); }
    };
    load();
    const t = setInterval(load, 30 * 60 * 1000);
    return () => clearInterval(t);
  }, []);

  return (
    <>
      <div className="han-weather-split">
        <div className="han-weather-half">
          <div className="han-value" style={{ fontSize: 28 }}>
            {power == null ? <>–<span className="unit"> W</span></>
              : kw >= 1 ? (() => { const { intPart, decPart } = formatDecimal(kw, 2); return <>{intPart}<em>,{decPart}</em><span className="unit"> kW</span></>; })()
              : <>{Math.round(power)}<span className="unit"> W</span></>}
          </div>
          <div className="han-detail">Strøm nå</div>
        </div>
        <div className="han-weather-half">
          <div className="weather-temp" style={{ fontSize: 28 }}>
            {temp != null ? <>{Number(temp).toFixed(1).replace('.', ',')}<em>°</em></> : <>–<em>°</em></>}
          </div>
          <div className="han-detail">{sensor ? "Ute" : "Ingen sensor"}</div>
        </div>
      </div>
      {blocks.length > 0 && (
        <div className="wx-blocks">
          {blocks.map((b, i) => (
            <div key={i} className="wx-block">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                <div className="wx-block-time" style={{marginBottom:0}}>{b.label}</div>

const TRANSIT_STOPS = [
  { key: "kragsvei",        label: "Krags vei",   dir: "Majorstuen",    mode: "bus"   },
  { key: "amager",          label: "Amagerveien", dir: "Majorstuen",    mode: "bus"   },
